pt:
  status: sourced
  statute: "West Bengal State Tax on Professions, Trades, Callings and Employments Act, 1979"
  section: "Schedule (see section 3(2)), Sl. No. 1 — employees earning monthly salary or wages; effective 1-4-2014 (Notification 440-L dt. 11-03-2014 read with 848-F.T. dt. 28-05-2014); band (ii) reduced to Nil w.e.f. 1-8-2016 (Notification 682-L dt. 28-07-2016 read with 1197-FT dt. 16-08-2016)"
  citation_url: "https://comtax.wb.gov.in/Ptax-Schedule-New_(w.e.f._1-4-2014).pdf"
  citation_locator: >-
    WB Directorate of Commercial Taxes (comtax.wb.gov.in), "Schedule to the West Bengal
    State Tax on Professions, Trades, Callings and Employments Act, 1979 effective from
    1-4-2014", Sl. No. 1 "Employees earning monthly salary or wages": "(i) Not exceeding
    Rs.8,500 — Nil; (ii) Above Rs.8,500 but not exceeding Rs.10,000 — Nil* (*Tax rate
    reduced to 'Nil', from Rs 90/- p.m., with effect from 1-8-2016 vide Notification No.
    682-L dt.28th July, 2016 read with Notification No. 1197-FT dt.16th August, 2016);
    (iii) Above Rs.10,000 but not exceeding Rs.15,000 — Rs.110 per month; (iv) Above
    Rs.15,000 but not exceeding Rs.25,000 — Rs.130 per month; (v) Above Rs.25,000 but not
    exceeding Rs.40,000 — Rs.150 per month; (vi) Above Rs.40,000 — Rs.200 per month".
    Fetched 2026-07-23 and read verbatim.
