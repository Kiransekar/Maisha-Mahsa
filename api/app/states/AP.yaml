# WS2.2 state pack — Andhra Pradesh. Data, not code (§WS2). Amounts are integer paise.
code: AP
name: Andhra Pradesh
pack_version: "2026.07.1"

pt:
  status: sourced
  statute: "Andhra Pradesh Tax on Professions, Trades, Callings and Employments Act, 1987 (Act 22 of 1987)"
  section: "First Schedule (Under Section 4), Sl. No. 1 — salary and wage earners"
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/16343/1/act_no_22_of_1987.pdf"
  citation_locator: >-
    India Code consolidated PDF of the Act (as amended), First Schedule (Under Section 4),
    Sl. No. 1 "Salary and wage earners whose monthly salaries or wages in Rs": "(i) Up to
    15,000 — Nil; (ii) From 15,001 to 20,000 — 150 PM; (iii) Above 20,000 — 200 PM".
    Fetched 2026-07-23 and read verbatim.
  registration_types: [employer-registration, enrolment]
  periodicity: monthly
  slabs_monthly:
    all:
      - { upto_rupees: 15000, tax_paise: 0 }
      - { upto_rupees: 20000, tax_paise: 15000 }
      - { upto_rupees: null, tax_paise: 20000 }

