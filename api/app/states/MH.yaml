# WS2.2 state pack — Maharashtra. Data, not code (§WS2). Amounts are integer paise.
# Every `sourced` block cites the official instrument it was read from VERBATIM (§0.6).
# A `blocked_ca` block makes the loader REFUSE to compute that item — never a silent ₹0.
code: MH
name: Maharashtra
pack_version: "2026.07.1"

pt:
  status: sourced
  statute: "Maharashtra State Tax on Professions, Trades, Callings and Employments Act, 1975"
  section: "Schedule I (see section 3), entry 1 — period '1/4/2023 onwards'"
  citation_url: "https://www.mahagst.gov.in/public/uploads/menufiles/PT%20Rate%20Schedule%20updated%20upto%2031.03.2025%20(1)%20(1).pdf"
  citation_locator: >-
    "RATE SCHEDULES UNDER THE PROFESSION TAX ACT, 1975 — As on 31.03.2025", SCHEDULE I
    (SEE SECTION 3), entry 1 "Salary and Wage earners", period "1/4/2023 onwards":
    (i) men — (a) do not exceed rupees seven thousand five hundred: Nil; (b) exceed 7,500
    but do not exceed 10,000: one hundred seventy-five per month; (c) exceed rupees ten
    thousand: two thousand five hundred per annum, (a) two hundred per month except for the
    month of February, (b) three hundred for the month of February.
    (ii) women — (a) do not exceed rupees twenty-five thousand: Nil; (b) exceed rupees
    twenty-five thousand: 2,500 per annum as 200 per month except February, 300 for February.
    Fetched 2026-07-23 (mahagst.gov.in, official rate-schedule PDF, pages 3).
  registration_types: [PTRC, PTEC]
  periodicity: monthly
  slabs_monthly:
    # Category keys follow the instrument: Schedule I entry 1 distinguishes men/women.
    # The payroll engine currently computes without a gender attribute and uses `male`
    # (the stricter table) — a documented modelling gap, not a statutory claim.
    male:
      - { upto_rupees: 7500, tax_paise: 0 }
      - { upto_rupees: 10000, tax_paise: 17500 }
      - { upto_rupees: null, tax_paise: 20000, february_tax_paise: 30000 }
    female:
      - { upto_rupees: 25000, tax_paise: 0 }
      - { upto_rupees: null, tax_paise: 20000, february_tax_paise: 30000 }

lwf:
  status: blocked_ca
  reason: >-
    BLOCKED-CA: Maharashtra Labour Welfare Fund contribution amounts and due months are not
    yet sourced from the Maharashtra Labour Welfare Board's official notification. The engine's
    legacy table (Rs.25/75, Jun+Dec) is uncited and cannot be promoted into pack data (§0.6).

shops_establishments:
  status: blocked_ca
  reason: >-
    BLOCKED-CA: registration/renewal thresholds and leave defaults under the Maharashtra Shops
    and Establishments (Regulation of Employment and Conditions of Service) Act 2017 not yet
    sourced from the official instrument.

minimum_wages:
  status: blocked_ca
  reason: >-
    BLOCKED-CA: minimum-wage tables require the current half-yearly special-allowance (VDA)
    notification from the Maharashtra labour department; no official notification sourced.

stamp_duty_share_certificates:
  status: blocked_ca
  reason: >-
    BLOCKED-CA: share-certificate stamp-duty rate and deadline under the Maharashtra Stamp Act
    Schedule I not yet sourced from the official schedule text.

eway_intra_state_threshold:
  status: blocked_ca
  reason: >-
    BLOCKED-CA: Maharashtra intra-state e-way-bill threshold requires the state notification
    under CGST/SGST rule 138(1); not yet sourced from an official notification.

labour_code_rules:
  status: blocked_ca
  reason: >-
    BLOCKED-CA: status of Maharashtra's draft/final rules under the four Labour Codes requires
    verification against the state gazette; tracked by the compliance-calendar watch item.
