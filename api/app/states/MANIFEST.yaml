# State-pack manifest (WS2.1) — the WS1.E3 rule-pack mechanism (dif/rules/MANIFEST.yaml)
# extended per-state: one sha256 per pack file, bound to a pack-set version. The loader
# (app/core/state_packs.py) refuses to serve a pack whose bytes, version, or manifest entry
# do not match — fail loud at load, never silently drift. On every pack change: bump the
# pack_version in the file AND `version` here, recompute that file's sha256
# (sha256sum api/app/states/<code>.yaml), and add a CHANGELOG.md entry. When WS3 ports a
# state-varying path to Rust, Mahsa loads these same YAMLs as data — packs never become code.
