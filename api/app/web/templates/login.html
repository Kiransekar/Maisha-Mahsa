<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · {{ settings.app_name }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="login">
  <main class="login__card">
    <div class="login__brand"><span class="dot"></span> {{ settings.app_name }}</div>
    <p class="login__sub">Sign in to your virtual CFO</p>
    {% if error %}<div class="login__err" role="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="pw">Password</label>
      <input id="pw" name="password" type="password" autocomplete="current-password" autofocus required>
      <button type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
