<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ settings.app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="/static/js/app.js" defer></script>
</head>
<body>
  <div class="layout">
    <aside class="nav">
      <div class="nav__brand"><span class="dot"></span> Maisha-Mahsa</div>
      <a class="nav__item {{ 'is-active' if nav_active == 'dashboard' }}" href="/">Dashboard</a>
      <a class="nav__item {{ 'is-active' if nav_active == 'ask' }}" href="/ask">Ask Maisha</a>
      <div class="nav__group">Domains</div>
      {% set domain_labels = ["treasury","revenue","payables","expense","payroll","gst","tax","compliance","ledger","forecast","equity","vault"] %}
      {% for d in domain_labels %}
        <a class="nav__item {{ 'is-active' if nav_active == d }}" href="/d/{{ d }}" style="text-transform:capitalize">{{ d }}</a>
      {% endfor %}
    </aside>
    <main class="main">
      <header class="appbar">
        <form class="ask" role="search"
              hx-post="/ask" hx-target="#ask-result" hx-swap="innerHTML" hx-indicator="#ask-spin">
          <input id="ask-input" name="q" type="text" autocomplete="off"
                 placeholder="Ask Maisha…  (press /)" aria-label="Ask Maisha">
          <button type="submit">Ask</button>
          <span id="ask-spin" class="htmx-indicator spinner" aria-hidden="true"></span>
        </form>
        <div class="appbar__status" title="Mahsa gatekeeper status">
          Mahsa <span class="sdot {{ 'sdot--ok' if mahsa_up|default(true) else 'sdot--off' }}"></span>
        </div>
      </header>
      <div id="ask-result"></div>
      {% block content %}{% endblock %}
      <div id="toast" class="toast" aria-live="polite"></div>
    </main>
  </div>
</body>
</html>
