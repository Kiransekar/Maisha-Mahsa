{# Scenario outcome: net change, min cash over the horizon, and runway. #}
<div class="scenario-out">
  <div class="kpi">
    <div class="kpi__label">Monthly net change</div>
    <div class="kpi__value">{{ s.net_fmt }}</div>
  </div>
  <div class="kpi">
    <div class="kpi__label">Min cash (12 mo)</div>
    <div class="kpi__value">{{ s.min_cash_fmt }}</div>
  </div>
  <div class="kpi">
    <div class="kpi__label">Runway</div>
    <div class="kpi__value">{{ s.runway_fmt }}</div>
  </div>
</div>
