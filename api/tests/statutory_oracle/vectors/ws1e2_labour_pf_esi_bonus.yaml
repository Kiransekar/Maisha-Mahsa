# ---- Bonus D1 fix pinned: the rate is EXACTLY 1/12, not 0.0833 ---------------------------------
- id: bonus_exact_one_twelfth_6006
  statute: Code on Wages 2019
  section: "26(1)"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    CoW s.26(1) verbatim (re-read 2026-07-23): "an annual minimum bonus calculated at the rate
    of eight and one-third per cent. of the wages earned by the employee or one hundred rupees,
    whichever is higher". Eight and one-third per cent. = 25/3 % = exactly 1/12.
  source: >-
    D1 REGRESSION LOCK. Basic ₹6,006 (600,600 paise, below both ceilings — no carry-over
    reading is exercised): exact 1/12 = 600,600/12 = 50,050 paise = ₹500.50 -> half-up ₹501 =
    50,100 paise. The repealed 0.0833 approximation gave 600,600 × 0.0833 = 50,029.998 paise =
    ₹500.30 -> ₹500 — a ₹1 statutory error this vector pins out forever.
  ca_initials: PENDING
  ca_date: null
  target: bonus_provision_monthly
  inputs: {basic_monthly: 600600}
  expected: 50100

# ---- Bonus D2 fix pinned: the s.26(1) ₹100 ANNUAL floor ----------------------------------------
- id: bonus_floor_binds_below_100_rupees
  statute: Code on Wages 2019
  section: "26(1)"
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    CoW s.26(1): "an ANNUAL minimum bonus calculated at the rate of eight and one-third per
    cent. of the wages earned by the employee or one hundred rupees, whichever is higher".
  alternatives_considered:
    - "CHOSEN — the ₹100 floor is ANNUAL (the statute says 'annual minimum bonus ... or one
       hundred rupees'). At the exact rate 1/12, the annual minimum on a constant capped
       monthly wage equals ONE month's capped wage, so annual minimum = max(cap, ₹100) and the
       engine's monthly accrual slice = max(cap, ₹100)/12, half-up to the rupee (the module's
       uniform payslip rounding). 12 × the rounded ₹8 slice = ₹96 vs the ₹100 annual figure —
       a rounding artefact of rupee-rounded monthly accrual, only reachable when the monthly
       wage is under ₹100, below every notified minimum wage; recorded, not hidden."
    - "₹100 floor applied PER MONTH (max(cap/12, ₹100) monthly, i.e. an annual ₹1,200 floor) —
       rejected: s.26(1)'s ₹100 qualifies the 'annual minimum bonus', not a monthly figure;
       a per-month floor would provision 12× the statutory amount."
    - "Ceiling-rounding the floor slice (₹8.33 -> ₹9) so the 12-month sum ≥ ₹100 — rejected
       for consistency: every monthly statutory figure in this module rounds half-up; the CA
       may direct otherwise on sign-off."
  source: >-
    Basic ₹60/month (6,000 paise): rate leg 1/12 = 500 paise = ₹5; annual floor comparison
    max(6,000, 10,000) = 10,000 paise -> monthly slice 10,000/12 = 833.33 paise = ₹8.33 ->
    half-up ₹8 = 800 paise. Before the D2 fix the engine returned ₹5 — an under-provision.
  ca_initials: PENDING
  ca_date: null
  target: bonus_provision_monthly
  inputs: {basic_monthly: 6000}
  expected: 800

- id: bonus_floor_boundary_at_100_rupees
  statute: Code on Wages 2019
  section: "26(1)"
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    CoW s.26(1) ("... or one hundred rupees, whichever is higher") — the two legs meet where
    8⅓% of annual wages equals ₹100, i.e. monthly capped wage exactly ₹100.
  alternatives_considered:
    - "CHOSEN — annual-floor reading as recorded on bonus_floor_binds_below_100_rupees (one CA
       confirmation covers both floor vectors)."
    - "Per-month ₹100 floor — rejected there; same here."
  source: >-
    Basic exactly ₹100/month (10,000 paise): rate leg = floor leg = 10,000 paise annual ->
    monthly slice 833.33 paise -> ₹8 = 800 paise. PAIRED with the binding vector: at and above
    this boundary the floor never lifts the figure.
  ca_initials: PENDING
  ca_date: null
  target: bonus_provision_monthly
  inputs: {basic_monthly: 10000}
  expected: 800

# ---- Gratuity accrual (15/26 formula + s.53(3) ceiling) ----------------------------------------
- id: gratuity_accrual_26000_10y
  statute: Code on Social Security 2020
  section: "53(2) Explanation 3"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/16823/1/aA2020-36.pdf"
  citation_locator: >-
    CoSS s.53(2) + Explanation 3: fifteen days' wages per completed year = monthly wages last
    drawn ÷ 26 × 15 (verbatim on record in ws1b_wiring_gratuity.yaml).
  source: >-
    ACCRUAL-LIABILITY figure (balance-sheet provision), not an exit award — the s.53(1)
    eligibility floors live on the gratuity_hybrid vectors. Last-drawn ₹26,000, 10 completed
    years: (15/26) × 26,000 × 10 = ₹1,50,000 exactly = 15,000,000 paise, under the ceiling.
  ca_initials: PENDING
  ca_date: null
  target: gratuity_required
  inputs: {last_basic_monthly: 2600000, completed_years: 10}
  expected: 15000000

