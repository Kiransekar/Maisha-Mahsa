# WS1.E2 — Labour Codes: PF wage-ceiling paths (EPF/EPS split), ESI ceiling boundary, statutory
# minimum bonus bounds, gratuity accrual formula + ceiling. Amounts are integer paise.
# Extends ws1b_wiring_gratuity.yaml (which owns the s.2(y)-base wiring and exit-gratuity floors).
#
# PRIMARY SOURCES (fetched 2026-07-23, read verbatim):
#  * EPFO, "PRESENT RATES OF CONTRIBUTION"
#    (https://www.epfindia.gov.in/site_docs/PDFs/MiscPDFs/ContributionRate.pdf):
#    EMPLOYEE EPF "12% /10% ##"; EMPLOYER EPS "8.33% ##", EPF "Difference of EE share and
#    Pension Contribution"; "## Contribution is rounded to the nearest rupee for each employee,
#    for the employee share, pension contribution and EDLI contribution. The Employer Share is
#    difference of the EE Share (payable as per statute) and Pension Contribution."; "The
#    contributions are payable on maximum wage ceiling of Rs. 15000/-". (Same instrument the
#    initialled-pending ws1b wiring vector already relies on.)
#  * ESI (Central) Rules 1950, edition "As on 01.04.2021"
#    (https://www.esic.nic.in/attachments/actfile/b3f0e6aa6e4c00f697ae17292c7e3448.pdf):
#    rule 50 — "The wage limit for coverage of an employee under sub-clause (b) of clause (9) of
#    Section 2 of the Act shall be twenty one thousand rupees a month"; rule 51 — employer's
#    contribution "a sum (rounded to the next higher rupee) equal to three and one-fourth per
#    cent."; employee's "a sum (rounded to the next higher rupee) equal to three-fourth per
#    cent. of the wages".
#  * Code on Wages 2019 (Act 29 of 2019) s.26
#    (https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf): s.26(1) — "an
#    annual minimum bonus calculated at the rate of eight and one-third per cent. of the wages
#    earned by the employee or one hundred rupees, whichever is higher"; s.26(3) — maximum
#    "twenty per cent. of such wages"; s.26(2) — calculation wage where wages exceed the
#    notified amount: "as if his wage were such amount ... or the minimum wage fixed by the
#    appropriate Government, whichever is higher".
#  * Payment of Bonus (Amendment) Act, 2015 (No. 6 of 2016)
#    (https://www.labour.gov.in/static/uploads/2025/06/c47b3b4a1390d211cf63f144f8aa6e7f.pdf):
#    s.2 — PoB Act s.2(13) "twenty-one thousand rupees" (eligibility); s.3 — PoB Act s.12
#    "seven thousand rupees or the minimum wage for the scheduled employment ... whichever is
#    higher" (calculation ceiling).
#  * Code on Social Security 2020 s.53(2)+Explanation 3 and s.53(3)+s.164(2)(a): already
#    sourced verbatim in ws1b_wiring_gratuity.yaml (aA2020-36.pdf).
#
# ENGINE DEFECTS/GAPS (status as of the [D1-D2-D4-D5-FIX] round, 2026-07-23):
#  * BONUS RATE (WS1.E2 defect D1) — FIXED. The engine now computes the s.26(1) rate as the
#    exact fraction 1/12 ("eight and one-third per cent.") in integer paise; the old
#    Decimal("0.0833") approximation (Basic ₹6,006 -> engine ₹500 vs statute ₹501) is gone.
#    Pinned by bonus_exact_one_twelfth_6006 below; the pre-existing bonus vectors (chosen where
#    both rates rounded identically) are unchanged and still green.
#  * BONUS FLOOR (WS1.E2 defect D2) — FIXED. s.26(1)'s "or one hundred rupees, whichever is
#    higher" is implemented as the ANNUAL floor the text states; see the bonus_floor_* vectors
#    below for the recorded monthly-accrual reading.
#  * BONUS CALC WAGE (WS1.E2 defect D3) — OPEN, BLOCKED-CA: s.26(2)'s "or the minimum wage ...
#    whichever is higher" leg of the ₹7,000 calculation ceiling is not modelled (the engine has
#    no minimum-wage input; needs CA guidance on the applicable scheduled-employment wage).
#  * ESI CONTINUATION: rule 50 proviso (employee crossing ₹21,000 mid-contribution-period stays
#    covered until period end) is not modelled — the input is the employee's coverage-relevant
#    gross, the caller owns period semantics.

