# ---- Bonus: 8⅓% minimum on the ₹7,000-capped wage; ₹21,000 eligibility edge --------------------
- id: bonus_min_at_calc_ceiling_7000
  statute: Code on Wages 2019
  section: "26(1); 26(2)"
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    CoW s.26(1): "an annual minimum bonus calculated at the rate of eight and one-third per
    cent. of the wages earned"; s.26(2): calculation wage where wages exceed the notified
    amount. Amounts: Payment of Bonus (Amendment) Act 2015 s.3 — PoB s.12 "seven thousand
    rupees or the minimum wage ... whichever is higher"
    (https://www.labour.gov.in/static/uploads/2025/06/c47b3b4a1390d211cf63f144f8aa6e7f.pdf).
  alternatives_considered:
    - "CHOSEN — the PoB-era notified amounts (₹21,000 eligibility, ₹7,000 calculation wage)
       carry into CoW s.26's 'as determined by notification' slots via the s.69(2) savings
       clause, the same transition reading the owner approved for the gratuity ceiling
       (gratuity_ceiling_clamps_at_20_lakh). No CoW-specific notification of different amounts
       was found."
    - "No eligibility/calculation ceiling operates until a notification expressly under CoW
       s.26 issues — rejected: it would strip the bonus provisions of their operative amounts
       and contradicts the s.69(2) deeming."
    - "s.26(2) 'or the minimum wage, whichever is higher' could lift the ₹7,000 calc wage in
       scheduled employments — the engine takes no minimum-wage input, so the ₹7,000 leg alone
       is exercised here (gap recorded in PROGRESS)."
  source: >-
    Basic ₹7,000 (at the calc ceiling): monthly minimum-bonus provision = 8⅓% × 7,000 =
    700,000/12 paise = ₹583.33 -> half-up ₹583 = 58,300 paise. (Engine computes the exact 1/12
    fraction since the D1 fix.)
  ca_initials: PENDING
  ca_date: null
  target: bonus_provision_monthly
  inputs: {basic_monthly: 700000}
  expected: 58300

