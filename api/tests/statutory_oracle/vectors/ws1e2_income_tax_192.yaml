- id: it192_surcharge_relief_binds_at_50L_plus_1
  statute: Income-tax Act 1961
  section: "115BAC(1A); FA 2025 s.2(9) surcharge + marginal relief"
  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf"
  citation_locator: >-
    FA 2025 s.2(9), proviso for s.115BAC(1A) persons: 10% surcharge where total income
    "exceeding fifty lakh rupees but not exceeding one crore rupees"; marginal-relief proviso:
    where total income exceeds "(i) fifty lakh rupees but does not exceed one crore rupees,
    the total amount payable as 'advance tax' on such income and surcharge thereon shall not
    exceed the total amount payable ... on a total income of fifty lakh rupees by more than
    the amount of income that exceeds fifty lakh rupees".
  source: >-
    Taxable ₹50,00,001 (500,000,100 paise): slab tax = 108,000,030 paise; +10% surcharge =
    118,800,033 paise; relief cap = tax@50L (108,000,000) + excess ₹1 (100 paise) =
    108,000,100 paise -> relief binds. Cess ×1.04 exactly = 112,320,104 paise ->
    ₹11,23,201.04 -> half-up ₹11,23,201 = 112,320,100 paise. One rupee of income above ₹50L
    costs ₹1.04 of tax, rounded — pinning that the band edge does NOT cliff.
  ca_initials: PENDING
  ca_date: null
  target: annual_income_tax
  inputs: {annual_taxable: 500000100}
  expected: 112320100

