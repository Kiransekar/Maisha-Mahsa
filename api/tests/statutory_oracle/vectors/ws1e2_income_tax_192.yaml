  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf"
  citation_locator: >-
    Finance Act 2025 s.20 (s.87A clause (b)), s.25 (slabs), s.2(11) (cess).
  source: >-
    Taxable ₹12,70,589: slab tax = 60,000 + 15% × 70,589 = ₹70,588.35 (7,058,835 paise); excess
    = ₹70,589.00 (7,058,900 paise). Tax no longer exceeds the excess -> clause (b) gives no
    deduction; slab tax stands. Cess: 7,058,835 × 1.04 = 7,341,188.4 -> 7,341,188 paise =
    ₹73,411.88 -> rounds to ₹73,412 (7,341,200). Same rupee figure as one rupee below — the
    relief taper is exactly exhausted here, which is what this pair pins.
  ca_initials: PENDING
  ca_date: null
  target: annual_income_tax
  inputs: {annual_taxable: 127058900}
  expected: 7341200

