- id: it192_rebate_zero_at_limit_1200000
  statute: Income-tax Act 1961
  section: "87A proviso (a)"
  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf"
  citation_locator: >-
    Finance Act 2025 s.20(a)(i): s.87A proviso clause (a) — "the income does not exceed"
    twelve hundred thousand rupees -> deduction of 100% of the income-tax payable or sixty
    thousand rupees, whichever is less.
  source: >-
    AT exactly ₹12,00,000 the income "does not exceed" the limit, so the rebate applies. Slab
    tax = 5%×4,00,000 + 10%×4,00,000 = ₹20,000 + ₹40,000 = ₹60,000 — exactly the ₹60,000 cap,
    so 100%-of-tax and the cap coincide and the rebate wipes the full tax. Net ₹0. This is the
    right-edge of the rebate zone; the next vector is one rupee past it.
  ca_initials: PENDING
  ca_date: null
  target: annual_income_tax
  inputs: {annual_taxable: 120000000}
  expected: 0

- id: it192_marginal_relief_one_rupee_above_limit
  statute: Income-tax Act 1961
  section: "87A proviso (b) — marginal relief"
  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf"
  citation_locator: >-
    Finance Act 2025 s.20: s.87A proviso clause (b) — where total income exceeds ₹12,00,000 and
    the tax payable exceeds the excess of income over ₹12,00,000, the deduction equals the tax
    in excess of that excess (i.e. tax is clipped to the excess). Cess: FA 2025 s.2(11), 4%.
  source: >-
    Taxable ₹12,00,001. Slab tax = 60,000 + 15% × ₹1 = ₹60,000.15 (6,000,015 paise). Excess over
    the limit = ₹1 (100 paise). Marginal relief clips tax to the ₹1 excess. Cess 4% -> 104 paise
    -> rounds to the nearest rupee -> ₹1 = 100 paise.
  ca_initials: PENDING
  ca_date: null
  target: annual_income_tax
  inputs: {annual_taxable: 120000100}
  expected: 100

