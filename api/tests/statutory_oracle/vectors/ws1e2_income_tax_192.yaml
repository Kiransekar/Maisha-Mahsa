- id: it192_no_surcharge_at_exactly_50_lakh
  statute: Income-tax Act 1961
  section: "115BAC(1A)(iii); FA 2025 s.2(9) surcharge threshold"
  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf"
  citation_locator: >-
    Finance Act 2025 s.2(9), proviso for persons chargeable under s.115BAC(1A): surcharge where
    "such income exceeds ... fifty lakh rupees". At exactly ₹50,00,000 the income does not
    EXCEED fifty lakh, so no surcharge arises. Slabs s.25; cess s.2(11).
  source: >-
    Taxable ₹50,00,000: 3,00,000 + 30% × 26,00,000 (=7,80,000) = ₹10,80,000; no surcharge at
    exactly ₹50L; cess ×1.04 = ₹11,23,200 = 112,320,000 paise. This is the highest income this
    suite pins: the engine implements NO surcharge bands, so incomes above ₹50,00,000 are out
    of its honest range (gap recorded in PROGRESS [WS1.E2-expand], not vectored).
  ca_initials: PENDING
  ca_date: null
  target: annual_income_tax
  inputs: {annual_taxable: 500000000}
  expected: 112320000

