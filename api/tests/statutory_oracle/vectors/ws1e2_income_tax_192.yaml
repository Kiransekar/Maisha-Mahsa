# WS1.E2 — Personal income-tax (s.192 projection engine): new-regime slabs, s.87A rebate
# boundary, marginal relief, and the standard deduction, FY 2025-26 (AY 2026-27).
# Targets: annual_income_tax / monthly_tds (app/domains/payroll/statutory.py). Integer paise.
#
# PRIMARY SOURCES (each fetched 2026-07-23 and read verbatim from the PDF text):
#  * SLABS — Finance Act, 2025 (No. 7 of 2025) s.25, inserting s.115BAC(1A)(iii) Income-tax Act
#    1961 "for any previous year relevant to the assessment year beginning on or after the
#    1st April, 2026": Upto Rs. 4,00,000 Nil; 4,00,001–8,00,000 5%; 8,00,001–12,00,000 10%;
#    12,00,001–16,00,000 15%; 16,00,001–20,00,000 20%; 20,00,001–24,00,000 25%; above 24,00,000
#    30%. https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf
#    (Gazette CG-DL-E-29032025-262125; same URL already relied on by company_115baa_1cr).
#  * REBATE — Finance Act 2025 s.20, amending s.87A (w.e.f. 1-4-2026): proviso clause (a) —
#    limit "twelve hundred thousand rupees", cap "sixty thousand rupees"; clause (b) — marginal
#    relief: where total income exceeds 12,00,000 "and the income-tax payable on such total
#    income exceeds the amount by which the total income is in excess of twelve hundred thousand
#    rupees, an amount equal to the amount by which the income-tax payable ... is in excess of
#    the amount by which the total income exceeds" 12,00,000; new second proviso — the deduction
#    shall not exceed the tax payable per s.115BAC(1A) rates.
#  * CESS — Finance Act 2025 s.2(11): "Health and Education Cess on income-tax, calculated at
#    the rate of four per cent. of such income-tax and surcharge".
#  * SURCHARGE nil band — Finance Act 2025 s.2(9) proviso for persons taxed under s.115BAC(1A):
#    surcharge applies where "such income exceeds ... fifty lakh rupees". All vectors here are
#    AT or BELOW ₹50,00,000 total income, where no surcharge arises.
#  * STANDARD DEDUCTION — Finance (No. 2) Act, 2024 (No. 15 of 2024) s.10, inserting a proviso
#    into s.16(ia): under new-regime computation the deduction reads "seventy-five thousand
#    rupees" (https://egazette.gov.in/WriteReadData/2024/256436.pdf, w.e.f. 1-4-2025).
#
# ENGINE-SCOPE NOTES (recorded, not hidden — see PROGRESS [WS1.E2-expand]):
#  * The engine's s.87A implementation zeroes tax whenever taxable <= ₹12,00,000. That is exactly
#    "100% of the tax or ₹60,000 whichever is less" because the slab tax AT ₹12,00,000 is exactly
#    ₹60,000 (5%×4L + 10%×4L) and is monotonic below it — so the ₹60,000 cap can never bind
#    inside the rebate zone. The equivalence is arithmetic, not an extra assumption.
#  * Individual SURCHARGE BANDS (>₹50L) are NOT implemented in annual_income_tax — no vector
#    above ₹50,00,000 is drafted; the gap is reported in PROGRESS, not papered over.
#  * The engine applies cess to the post-rebate tax and rounds the final figure to the nearest
#    rupee (s.288B rounding convention carried by the existing suite).

