# ---- s.234E: cap-exact boundary (extends ws1_late_fee_234e) ------------------------------------
- id: late_fee_234e_cap_reached_exactly
  statute: Income-tax Act 1961
  section: "234E"
  provenance: primary
  citation_url: https://www.incometaxindia.gov.in/w/section-234e-13
  citation_locator: >-
    s.234E(1) — "a sum of two hundred rupees for every day during which the failure continues";
    s.234E(2) — the fee "shall not exceed the amount of tax deductible or collectible" (same
    departmental text already read verbatim for the ws1_late_fee_234e vectors).
  source: >-
    100 days × ₹200/day = ₹20,000 = the TDS amount exactly. min(20,000, 20,000) = ₹20,000 =
    2,000,000 paise. Boundary where the per-day accrual meets the s.234E(2) ceiling exactly —
    one more day (ws1_late_fee_234e's capped vector) stays flat.
  ca_initials: PENDING
  ca_date: null
  target: late_fee_234e
  inputs: {days_late: 100, tds_amount: 2000000}
  expected: 2000000
