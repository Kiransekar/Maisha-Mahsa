  citation_locator: >-
    Finance Act 2021 (No. 13 of 2021) s.54, inserted s.194Q(1): duty on purchase value
    "exceeding fifty lakh rupees in any previous year", tax "equal to 0.1 per cent. of such sum
    exceeding fifty lakh rupees".
  source: >-
    A single FY purchase of exactly ₹50,00,000 does not EXCEED fifty lakh -> nothing above the
    threshold, no deduction. (Buyer-turnover > ₹10 crore precondition of the s.194Q(1)
