# WS1.E2 — TDS section boundaries: 194C, 194H, 194J (technical), 194I month edge, 194Q, 194T.
# Extends ws1c_proven_defects.yaml (which owns the 194J 50k pair, 194I 55k/40k, 194C rate pair).
# Amounts are integer paise. All thresholds use STRICT "does not exceed" semantics — at the
# threshold no deduction, one paisa above it the duty begins (the §WS1.C1 operator, already
# regression-locked; every pair below extends it to more sections).
#
# PRIMARY SOURCES fetched 2026-07-23 and read verbatim:
#  * Finance Act 2025 (No. 7 of 2025), https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf:
#    s.63 — s.194H first proviso: for "fifteen thousand rupees" substitute "twenty thousand
#    rupees"; s.65 — s.194J: "fifty thousand rupees" (already vectored in ws1c).
#  * Finance (No. 2) Act 2024 (No. 15 of 2024), https://egazette.gov.in/WriteReadData/2024/256436.pdf:
#    s.57 — s.194H: for "five per cent." substitute "two per cent." (w.e.f. 1-10-2024);
#    s.62 — inserts s.194T: firm paying a partner salary/remuneration/commission/bonus/interest
#    deducts "at the rate of ten per cent"; s.194T(2): no deduction "where such sum or the
#    aggregate of such sums ... does not exceed twenty thousand rupees during the financial year".
#  * Finance Act 2020 (No. 12 of 2020), https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202020.pdf:
#    s.79 — s.194J(1): "two per cent. of such sum in case of fees for technical services (not
#    being a professional services ...) ... and ten per cent. of such sum in other cases".
#  * Finance Act 2021 (No. 13 of 2021), https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202021.pdf:
#    s.54 — inserts s.194Q: buyer paying a resident seller "for purchase of any goods of the
#    value or aggregate of such value exceeding fifty lakh rupees in any previous year ...
#    deduct an amount equal to 0.1 per cent. of such sum exceeding fifty lakh rupees".
#    s.194Q(5)(b) carve-out for 206C(1H) transactions was OMITTED by Finance Act 2025 s.69,
#    confirming TDS primacy (the engine's tcs_206c_1h_suppressed flag).
#  * s.194C rates/thresholds: already sourced in ws1c_proven_defects.yaml
#    (https://www.incometaxindia.gov.in/w/section-194c-54 — s.194C(1)(i)/(ii) 1%/2%, s.194C(5)
#    "does not exceed thirty thousand rupees", proviso: aggregate "exceeds one lakh rupees").
#
# ENGINE-SCOPE NOTES (see PROGRESS [WS1.E2-expand]):
#  * AGGREGATE CATCH-UP: when the FY aggregate first crosses a threshold, these engines deduct
#    on the CURRENT payment only — no retro-deduction on earlier sub-threshold payments in the
#    same FY. The statutes exempt while the aggregate "does not exceed" the limit and are silent
#    on arrears mechanics; deduct-on-crossing-payment-onward is one defensible reading, and every
#    vector that depends on it is provenance=interpretation with the alternative recorded.
#  * 194Q buyer precondition (turnover > ₹10 crore, s.194Q(1) Explanation) is presumed by the
#    engine — the caller is responsible for applicability; recorded, not modelled.
#  * s.194-I(a) 2% plant/machinery rate: NO reachable primary text this round
#    (incometaxindia.gov.in Akamai-403s this environment; no wayback snapshot) — the plant-rate
#    path stays unvectored, BLOCKED on a fetchable primary. Recorded in PROGRESS.

# ---- 194C: single-payment threshold pair + aggregate edge --------------------------------------
- id: tds_194c_at_30000_exact_none
  statute: Income-tax Act 1961
  section: "194C(5)"
  provenance: primary
  citation_url: "https://www.incometaxindia.gov.in/w/section-194c-54"
  citation_locator: >-
    s.194C(5): "No deduction shall be made from the amount of any sum credited or paid ... if
    such sum does not exceed thirty thousand rupees" (verbatim text already on record in
    ws1c_proven_defects.yaml).
  source: >-
    Exactly ₹30,000 "does not exceed" ₹30,000 -> no deduction. FY aggregate 0 keeps the
    ₹1,00,000 proviso inert. Paired with the one-paisa-above vector.
  ca_initials: PENDING
  ca_date: null
  target: tds_on_payment
  inputs: {section: "194C", amount: 3000000, payee_type: "individual"}
  expected: {applicable: false, tds_paise: 0}

- id: tds_194c_one_paisa_above_30000
  statute: Income-tax Act 1961
  section: "194C(1)(i); 194C(5)"
  provenance: primary
  citation_url: "https://www.incometaxindia.gov.in/w/section-194c-54"
  citation_locator: >-
    s.194C(1)(i): "one per cent where the payment is being made or credit is being given to an
    individual or a Hindu undivided family"; s.194C(5) "does not exceed thirty thousand rupees".
  source: >-
    ₹30,000.01 exceeds ₹30,000 -> duty arises on the whole sum. 1% × 30,000.01 = ₹300.0001 ->
    rounds to ₹300 = 30,000 paise.
  ca_initials: PENDING
  ca_date: null
  target: tds_on_payment
  inputs: {section: "194C", amount: 3000001, payee_type: "individual"}
  expected: {applicable: true, tds_paise: 30000}

- id: tds_194c_aggregate_at_100000_exact_none
  statute: Income-tax Act 1961
  section: "194C(5) proviso"
  provenance: primary
  citation_url: "https://www.incometaxindia.gov.in/w/section-194c-54"
  citation_locator: >-
    s.194C(5) proviso: deduction where "the aggregate of the amounts of such sums credited or
    paid or likely to be credited or paid during the financial year exceeds one lakh rupees".
  source: >-
    FY aggregate ₹70,000 + this ₹30,000 = exactly ₹1,00,000, which does not EXCEED one lakh;
    the single payment is also at (not above) ₹30,000. Neither trigger fires -> no deduction.
  ca_initials: PENDING
  ca_date: null
  target: tds_on_payment
  inputs: {section: "194C", amount: 3000000, payee_type: "individual", aggregate_ytd: 7000000}
  expected: {applicable: false, tds_paise: 0}

- id: tds_194c_aggregate_crossing_payment
  statute: Income-tax Act 1961
  section: "194C(5) proviso"
  provenance: interpretation
  citation_url: "https://www.incometaxindia.gov.in/w/section-194c-54"
  citation_locator: >-
    s.194C(5) proviso: "where the aggregate ... exceeds one lakh rupees, the person responsible
    for paying such sums ... shall be liable to deduct income-tax under this section".
  alternatives_considered:
    - "CHOSEN — deduct on the crossing payment (and every later one) only: ₹25,000 single is
       under ₹30,000, but aggregate ₹80,000 + ₹25,000 = ₹1,05,000 exceeds ₹1,00,000, so this
       payment is deducted at 1% = ₹250. Earlier sub-threshold payments of the FY are not
       retro-deducted by the engine."
    - "Catch-up on crossing: once the aggregate exceeds ₹1,00,000 the deductor must deduct on
       the ENTIRE aggregate including the earlier ₹80,000 (common compliance practice; 'liable
       to deduct income-tax under this section' read as reaching all sums of the year). Under
       this reading ₹1,050 falls due at this event, not ₹250. The statute does not spell out
       the arrears mechanics; CA to confirm which convention the product must implement."
  source: >-
    The aggregate trigger itself is primary; WHAT the crossing payment drags into deduction is
    the recorded choice. 1% × ₹25,000 = ₹250 = 25,000 paise on the chosen reading.
  ca_initials: PENDING
  ca_date: null
  target: tds_on_payment
  inputs: {section: "194C", amount: 2500000, payee_type: "individual", aggregate_ytd: 8000000}
  expected: {applicable: true, tds_paise: 25000}

