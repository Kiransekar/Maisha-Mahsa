  expected: {applicable: false, tds_paise: 0, taxable_paise: 0, tcs_206c_1h_suppressed: false}

- id: tds_194q_one_paisa_above_50_lakh
  statute: Income-tax Act 1961
  section: "194Q(1)"
  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202021.pdf"
  citation_locator: >-
    Finance Act 2021 s.54: "0.1 per cent. of such sum exceeding fifty lakh rupees" — the base
