# WS1.B1-wiring + WS1.B2 — PF/ESI routed through the s.2(y) wage base, and hybrid gratuity across
# the 21-11-2025 Labour-Code transition. Amounts are integer paise. Provenance per vector below.
#
# 2026-07-22 fix:labour-codes (defects #3/#4/#7 from PROGRESS [WS1-DEFECTS-FOUND]):
#   #3 — eligibility is now CoSS 2020 s.53(1): FIVE years continuous service, with the one-year
#        floor confined to fixed-term employment (the statute's own exception). The old vector
#        that paid a 2-year non-FTE exit ₹30,000 locked the defect in and is REPLACED by paired
#        at-threshold / one-short vectors on both floors.
#   #4 — s.53(3) notified ceiling (₹20,00,000) now applied; paired under/over vectors below.
#   #7 — special_allowance now INCLUDED in the wage base (see ws1b_wage_base.yaml); the wiring
#        vector proving it is wiring_special_allowance_in_pf_esi_base.
#
# CoSS 2020 s.53, read verbatim from India Code (aA2020-36.pdf, fetched 2026-07-22):
#   53.(1) "Gratuity shall be payable to an employee on the termination of his employment after
#   he has rendered continuous service for not less than five years,— (a) on his superannuation;
#   or (b) on his retirement or resignation; or (c) on his death or disablement due to accident
#   or disease; or (d) on termination of his contract period under fixed term employment; or (e)
#   on happening of any such event as may be notified by the Central Government: ... Provided
#   further that the completion of continuous service of five years shall not be necessary where
#   the termination of the employment of any employee is due to death or disablement or
#   expiration of fixed term employment or happening of any such event as may be notified by the
#   Central Government"
#   53.(2) "For every completed year of service or part thereof in excess of six months, the
#   employer shall pay gratuity to an employee at the rate of fifteen days' wages ... based on
#   the rate of wages last drawn by the employee concerned: ... Provided also that in the case of
#   an employee employed on fixed term employment or a deceased employee, the employer shall pay
#   gratuity on pro rata basis."
#   53.(3) "The amount of gratuity payable to an employee shall not exceed such amount as may be
#   notified by the Central Government."
#   Explanation 3: "in the case of a monthly rated employee, the fifteen days' wages shall be
#   calculated by dividing the monthly rate of wages last drawn by him by twenty-six and
#   multiplying the quotient by fifteen."
# KNOWN ENGINE LIMIT (not this ticket): s.53(2)'s "or part thereof in excess of six months"
# round-up of a final part-year is NOT implemented — the engine counts whole anniversary years
# only. Recorded in PROGRESS; the vectors below use whole-year inputs so no expected value
# depends on it.

# ---- WS1.B1-wiring: PF & ESI use the added-back s.2(y) base, not raw Basic and not gross -------
- id: wiring_pf_esi_on_underweighted_ctc
  statute: Code on Wages 2019
  section: "2(y)"
  # Basic ₹8k + HRA ₹12k = ₹20k gross; excluded (a)-(i) ₹12k = 60% > 50% -> add back ₹2k over
  # the ₹10k cap -> wage base ₹10,000. PF 12% of ₹10k = ₹1,200 (below ₹15k ceiling); ESI on ₹10k
  # = 0.75% ₹75 (ceil) / 3.25% ₹325. On raw Basic ₹8k it would be ₹960/₹60/₹260; on gross ₹20k it
  # would be ₹150/₹650 — so the asserted figures prove the wage base is used.
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Code on Wages, 2019 (Act 29 of 2019), s.2(y), FIRST PROVISO: "if payments made by the employer
    to the employee under clauses (a) to (i) exceeds one-half ... of the all remuneration calculated
    under this clause, the amount which exceeds such one-half ... shall be deemed as remuneration
    and shall be accordingly added in wages under this clause". This proviso is what fixes the wage
    base at ₹10,000 on these inputs (excluded HRA = ₹12,000 = 60% of ₹20,000 remuneration;
    excess over one-half = ₹2,000 added back to Basic ₹8,000).
  # Contribution rates applied to that base, each read on the administering authority's own
  # published rate statement:
  #   EPF 12% and the ₹15,000 wage ceiling — EPFO, "PRESENT RATES OF CONTRIBUTION", row EMPLOYEE
  #   "EPF 12% /10% ##" and note "The contributions are payable on maximum wage ceiling of Rs.
  #   15000/-" — https://www.epfindia.gov.in/site_docs/PDFs/MiscPDFs/ContributionRate.pdf
  #   ESI 0.75% / 3.25% — ESIC, Contribution page: "Currently, the employee's contribution rate
  #   (w.e.f. 01.07.2019) is 0.75% of the wages and that of employer's is 3.25% of the wages
  #   paid/payable in respect of the employees in every wage period" —
  #   https://esic.gov.in/contribution . The underlying amendment is G.S.R. 423(E) dated 13-06-2019
  #   (w.e.f. 1-7-2019) substituting the rates in rule 51 of the ESI (Central) Rules, 1950 — see
  #   footnotes 5 and 6 to rule 51 in
  #   https://esic.gov.in/attachments/actfile/35df0691b900c1d011c6ceb7913eb1d6.pdf (that compiled
  #   copy carries the pre-2019 figures in the rule body; only the footnotes record the
  #   substitution, so the rate figures themselves are cited to the ESIC page above).
  source: >-
    Code on Wages, 2019 s.2(y) first proviso (wage base) + EPFO published contribution rates
    (EPF 12%, ceiling ₹15,000) + ESIC published contribution rates (0.75% / 3.25% w.e.f.
    01.07.2019). The asserted figures prove the wage base ₹10,000 is used, not Basic ₹8,000
    (which would give 960/60/260) or gross ₹20,000 (which would give 150/650).
  ca_initials: PENDING
  ca_date: null
  target: payroll_components
  inputs:
    basic: 800000
    hra: 1200000
    lta: 0
    special_allowance: 0
    state: null
    month: 6
  expected:
    employee_pf: 120000
    employer_pf: 120000
    employee_esi: 7500
    employer_esi: 32500

- id: wiring_special_allowance_in_pf_esi_base
  statute: Code on Wages 2019
  section: "2(y)"
  # Defect #7 wiring proof: Basic ₹8k + HRA ₹6k + special ₹6k. special_allowance is WAGES
  # (no exclusion clause matches; SC universality test), so included = ₹14k and the (a)-(i)
  # aggregate is HRA ₹6k = 30% <= 50% -> NO add-back -> wage base ₹14,000. PF 12% = ₹1,680;
  # ESI ₹105 / ₹455. Under the pre-fix classification the base was ₹10,000 (PF ₹1,200,
  # ESI ₹75/₹325), so these figures prove the reclassification is wired through compute_components.
  provenance: interpretation
  citation_url: "https://indiankanoon.org/doc/126246109/"
  citation_locator: >-
    RPFC (II) West Bengal v. Vivekananda Vidyamandir & Ors (SC, 28-02-2019): allowances
    universally, necessarily and ordinarily paid to all employees form part of basic wages. Code
    on Wages 2019 s.2(y): "special allowance" appears in no exclusion clause (a)-(k), and the
    opening limb makes all money remuneration wages
    (https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf).
  alternatives_considered:
    - "CHOSEN — special_allowance included in the s.2(y) base (see the full alternatives record
       on wage_base_special_allowance_included in ws1b_wage_base.yaml)."
    - "Pre-fix behaviour: special_allowance excluded, base ₹10,000, PF ₹1,200, ESI ₹75/₹325.
       Rejected — uncited and under-computes statutory dues."
  ca_initials: OWNER
  ca_date: "2026-07-22"
  target: payroll_components
  inputs:
    basic: 800000
    hra: 600000
    lta: 0
    special_allowance: 600000
    state: null
    month: 6
  expected:
    employee_pf: 168000
    employer_pf: 168000
    employee_esi: 10500
    employer_esi: 45500

# ---- WS1.B2: hybrid gratuity across the 21-11-2025 boundary ------------------------------------
- id: gratuity_hybrid_split_old_and_new_base
  statute: Code on Social Security 2020 / Code on Wages 2019
  section: "53; 2(y)"
  # Service 2020-11-21 -> 2027-11-21 = 7 completed years (>= 5, eligible under s.53(1)).
  # Anniversaries completing before the 21-11-2025 boundary: 2021..2024 = 4 years on OLD base
  # ₹26,000 -> (15/26)x26000x4 = ₹60,000. The 2025-11-21 anniversary is ON the boundary -> post;
  # 2026,2027 -> 3 years on NEW base ₹52,000 -> (15/26)x52000x3 = ₹90,000. Total ₹1,50,000
  # (under the ₹20,00,000 s.53(3) ceiling).
  provenance: interpretation
  # The 15/26 factor itself IS primary — Code on Social Security, 2020 (Act 36 of 2020) s.53,
  # Explanation 3: "in the case of a monthly rated employee, the fifteen days' wages shall be
  # calculated by dividing the monthly rate of wages last drawn by him by twenty-six and
  # multiplying the quotient by fifteen"
  # (https://www.indiacode.nic.in/bitstream/123456789/16823/1/aA2020-36.pdf), identical to
  # Payment of Gratuity Act, 1972 s.4(2) Explanation
  # (https://clc.gov.in/clc/sites/default/files/PaymentofGratuityAct.pdf).
  # What is NOT primary — and what this vector's ₹1,50,000 actually turns on — is the
  # APPORTIONMENT CONVENTION at the 21-11-2025 boundary. Neither Code states a transition rule for
  # service straddling commencement. We chose per-anniversary apportionment; that is a choice.
  alternatives_considered:
    - "CHOSEN — per-completed-year apportionment: each completed year is valued on the base in
       force when its anniversary fell (anniversary strictly before 2025-11-21 -> old last-drawn
       Basic; on/after -> new s.2(y) wage base). Gives ₹60,000 + ₹90,000 = ₹1,50,000 here."
    - "Whole award on the regime in force at EXIT: all 7 years on the new s.2(y) base, i.e.
       (15/26) x ₹52,000 x 7 = ₹2,10,000. This is the reading most consistent with the statutory
       text, which computes gratuity on 'the rate of wages LAST DRAWN' (s.53(2)) with no
       year-by-year base, and with MoLE's Additional FAQs on Labour Codes (as on 16.03.2026)
       Sl. No. 17: 'The employee will be paid gratuity based on the rate of wages last drawn by
       the employee at the time of superannuation or retirement or resignation or death etc, on
       and after 21.11.2025 as per the provisions of Code on Social Security, 2020'
       (https://www.labour.gov.in/static/uploads/2026/03/a4ccf4c6d97c4f1f36a6d83f8c64213d.pdf).
       See value_disputes — this alternative may in fact be the correct one."
    - "Pro-rata by DAYS of service either side of the boundary rather than by completed-year
       anniversary. Differs from the chosen convention whenever the boundary falls mid-year;
       here the 2025-11-21 anniversary coincides with the boundary so the two agree only by
       accident of these inputs."
    - "Whole award on the OLD base (grandfather all service accrued before commencement).
       Rejected: MoLE FAQ Sl. No. 11 states gratuity calculation applies w.e.f. 21.11.2025, so a
       wholly-old-base computation for a post-commencement exit has no support."
  source: >-
    15/26 factor is primary (Code on Social Security, 2020 s.53(2) + Explanation 3). The
    pre/post-boundary apportionment is an INTERPRETATION: the Code prescribes no transition
    convention for service straddling its 21-11-2025 commencement. Ships BLOCKED.
  ca_initials: PENDING
  ca_date: null
  target: gratuity_hybrid
  inputs:
    doj: "2020-11-21"
    exit_date: "2027-11-21"
    boundary: "2025-11-21"
    old_base: 2600000
    new_base: 5200000
  expected: 15000000

