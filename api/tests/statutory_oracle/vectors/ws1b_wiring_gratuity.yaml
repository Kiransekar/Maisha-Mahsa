# ---- Defect #4: PAIRED ceiling vectors (s.53(3)) -----------------------------------------------
- id: gratuity_under_ceiling_passes_through
  statute: Code on Social Security 2020
  section: "53(2); 53(3)"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/16823/1/aA2020-36.pdf"
  citation_locator: >-
    s.53(2) + Explanation 3: fifteen days' wages per completed year = monthly wages last drawn
    divided by twenty-six, multiplied by fifteen. 17 years x ₹2,00,000/month ->
    (15/26) x 200000 x 17 = ₹19,61,538.46 -> ₹19,61,538 (nearest rupee), which is below the
    s.53(3) notified ceiling, so it passes through un-capped.
  source: >-
    CoSS 2020 s.53(2) Explanation 3 arithmetic; amount below the s.53(3) cap is unaffected by it.
    PAIRED with gratuity_ceiling_clamps_at_20_lakh.
