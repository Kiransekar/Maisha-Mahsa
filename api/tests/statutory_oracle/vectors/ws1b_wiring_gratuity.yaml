- id: gratuity_ceiling_clamps_at_20_lakh
  statute: Code on Social Security 2020
  section: "53(3)"
  # The EXISTENCE of the cap is primary (s.53(3) verbatim below). The AMOUNT applied
  # (₹20,00,000) rests on a transition reading: no notification issued UNDER CoSS s.53(3) could
  # be sourced, so the PoG-era notification is carried over via s.164(2)(a). That carry-over is
  # the interpretation.
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/16823/1/aA2020-36.pdf"
  citation_locator: >-
    CoSS 2020 s.53(3): "The amount of gratuity payable to an employee shall not exceed such
    amount as may be notified by the Central Government." s.164(2)(a): notwithstanding the repeal
    of (inter alia) the Payment of Gratuity Act, 1972, "anything done or any action taken under
    the enactments so repealed including any rule, regulation, notification ... shall be deemed
    to have been done or taken or provided for such purpose under the corresponding provisions of
    this Code ... and shall be in force to the extent they are not contrary to the provisions of
    this Code ... till they are repealed". The amount: S.O. 1420(E) dated 29-03-2018 under PoG
    Act 1972 s.4(3) specified that gratuity payable "shall not exceed twenty lakh rupees";
    government confirmation: PIB, Ministry of Labour & Employment, 30-03-2018, "Payment of
    Gratuity (Amendment) Act, 2018 brought in force on 29th March, 2018" — "the Government has
    issued the notification specifying the maximum limit to Rs. 20 Lakh"
    (https://web.archive.org/web/20240217082025/https://pib.gov.in/newsite/PrintRelease.aspx?relid=178218).
  alternatives_considered:
    - "CHOSEN — ₹20,00,000: S.O. 1420(E) (29-03-2018, PoG Act s.4(3)) deemed a s.53(3)
       notification by CoSS s.164(2)(a). A search for a CoSS-specific s.53(3) notification (and
       of the MoLE Labour-Codes FAQs of 16.03.2026) found none announcing a different amount."
    - "No ceiling until a notification issued expressly under s.53(3) is produced. Rejected:
       s.164(2)(a) says PoG-era notifications are deemed made under the corresponding Code
       provision, and an uncapped engine reproduces defect #4."
    - "A higher government-servant ceiling (₹25 lakh under CCS gratuity rules post-2024 DA
       revision). Rejected: that regime is outside CoSS Chapter V (s.53 Explanation 1 excludes
       such persons); not the notified amount for PoG/CoSS establishments."
  ca_initials: OWNER
  ca_date: "2026-07-22"
  target: gratuity_hybrid
  # 18 years x ₹2,00,000/month -> raw (15/26)x200000x18 = ₹20,76,923 -> clamps to exactly
  # ₹20,00,000 (200,000,000 paise). PAIRED with gratuity_under_ceiling_passes_through.
  inputs:
    doj: "2026-01-01"
    exit_date: "2044-01-01"
    boundary: "2025-11-21"
    old_base: 0
    new_base: 20000000
  expected: 200000000
