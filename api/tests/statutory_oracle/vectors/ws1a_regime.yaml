# WS1.A1 — dual-regime selector (Income-tax Act 1961 ↔ 2025). Boundary 2026-04-01, keyed on
# the earlier of credit/payment (MMX-1.0 §WS1.A1). Structural rule from the spec, not a rate.
#
# Provenance note (docs/STATUTORY_SOURCING.md §3, §4c):
#   The BOUNDARY DATE is a primary statutory fact — Income-tax Act, 2025 s.1(3), read from the
#   Gazette of India Extraordinary Part II—Section 1 No. 35 dated 21 August 2025:
#     "1. (1) This Act may be called the Income-tax Act, 2025.
#      (2) It extends to the whole of India.
#      (3) Save as otherwise provided in this Act, it shall come into force on the 1st April, 2026."
#   The SELECTOR (which of two dates decides the regime) is NOT in that section — it is our
#   structural rule, so vectors that exist only to exercise the selector are `derived`.

- id: regime_credit_mar_pay_apr_is_1961
  statute: Income-tax Act
  section: "regime boundary"
  provenance: derived
  source: >-
    DERIVED — structural rule, not a statutory value. The commencement date itself (2026-04-01)
    is cited on the boundary vectors below from Income-tax Act 2025 s.1(3). What this vector
    exercises is the SELECTOR: when credit and payment straddle the commencement, we resolve on
    the EARLIER of the two dates (mirroring the deduction-timing trigger the TDS chapter uses).
    That tie-break is our engine's structural convention (MMX-1.0 §WS1.A1), not a figure lifted
    from an instrument, so there is no legal citation to give and none is invented here.
    docs/STATUTORY_SOURCING.md §4c classifies exactly this case as derived.
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {credit_date: "2026-03-15", payment_date: "2026-04-10"}  # earlier = Mar -> old
  expected: regime_1961

- id: regime_advance_pay_mar_credit_apr_is_1961
  statute: Income-tax Act
  section: "regime boundary"
  provenance: derived
  source: >-
    DERIVED — the mirror image of the vector above (advance paid before commencement, credited
    after). Same structural earlier-of-credit-or-payment selector; no statutory figure is being
    asserted, only that the selector is symmetric in its two arguments. docs/STATUTORY_SOURCING.md §4c.
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {credit_date: "2026-04-05", payment_date: "2026-03-20"}  # advance paid Mar -> old
  expected: regime_1961

- id: regime_both_april_is_2025
  statute: Income-tax Act
  section: "s.1(3) — short title, extent and commencement"
  provenance: primary
  citation_url: "https://egazette.gov.in/WriteReadData/2025/265620.pdf"
  citation_locator: >-
    Income-tax Act, 2025 (No. 30 of 2025), Chapter I — Preliminary, section 1(3), page 1 of the
    Act text: "Save as otherwise provided in this Act, it shall come into force on the 1st April,
    2026." Gazette of India, Extraordinary, Part II—Section 1, No. 35, New Delhi, Thursday,
    August 21, 2025 (CG-DL-E-22082025-265620); assented 21 August 2025.
  source: >-
    PRIMARY. Both dates fall after commencement, so no selector tie-break is involved — the
    expected regime follows directly from the commencement date in s.1(3) as printed in the
    Gazette. PDF fetched and section 1 read verbatim (egazette.gov.in serves an incomplete TLS
    chain: the Let's Encrypt "YR2" intermediate must be supplied from http://yr2.i.lencr.org/
    for verification to succeed; the chain then validates to a trusted root).
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {credit_date: "2026-04-02", payment_date: "2026-04-10"}
  expected: regime_2025

- id: regime_on_boundary_is_2025
  statute: Income-tax Act
  section: "s.1(3) — short title, extent and commencement"
  provenance: primary
  citation_url: "https://egazette.gov.in/WriteReadData/2025/265620.pdf"
  citation_locator: >-
    Income-tax Act, 2025 (No. 30 of 2025), section 1(3): "Save as otherwise provided in this Act,
    it shall come into force on the 1st April, 2026." Gazette of India, Extraordinary,
    Part II—Section 1, No. 35, dated August 21, 2025 (CG-DL-E-22082025-265620).
  source: >-
    PRIMARY. This vector pins the INCLUSIVITY of the boundary: an event on 2026-04-01 itself is
    governed by the 2025 Act. "come into force ON the 1st April, 2026" makes that day the first
    day the Act operates, so the boundary is closed on the left — which is what the engine's
    `< REGIME_BOUNDARY` test implements. Read verbatim from the fetched Gazette PDF.
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {payment_date: "2026-04-01"}  # exactly the boundary -> new
  expected: regime_2025

