# ---- period-noun labels ------------------------------------------------------------------------
- id: year_label_2025_is_tax_year
  statute: Income-tax Act 2025
  section: "s.3(1)"
  provenance: primary
  citation_url: "https://egazette.gov.in/WriteReadData/2025/265620.pdf"
  citation_locator: >-
    Income-tax Act 2025 s.3(1): "For the purposes of this Act, 'tax year' means the twelve
    months period of the financial year commencing on the 1st April." The Act's operative
    provisions charge income "for a tax year" (e.g. s.202(1)).
  source: >-
    The 2025 Act's period noun is "Tax Year" — read verbatim from the Gazette PDF.
  ca_initials: PENDING
  ca_date: null
  target: year_label
  inputs: {regime: "regime_2025"}
  expected: "Tax Year"

- id: year_label_1961_is_assessment_year
  statute: Income-tax Act 1961
  section: "s.2(9) usage"
  provenance: primary
  citation_url: "https://thc.nic.in/Central%20Governmental%20Acts/Finance%20Act,%202025.pdf"
  citation_locator: >-
    Finance Act 2025 s.2(1) charges 1961-Act income-tax "for the assessment year commencing on
    the 1st April, 2025" — the 1961 machinery's period noun, used by the charging provision
    itself. (The TRACES-published Form 16, cited in ws1a_regime.yaml, carries the same
    "Assessment Year" rubric.)
  source: >-
    Under the 1961 regime the period noun is "Assessment Year".
  ca_initials: PENDING
  ca_date: null
  target: year_label
  inputs: {regime: "regime_1961"}
  expected: "Assessment Year"

# ---- old Acts -> Labour Codes: gratuity across 21-11-2025 --------------------------------------
- id: gratuity_pre_code_exit_all_old_base
  statute: Payment of Gratuity Act 1972 / Code on Social Security 2020
  section: "PoG s.4(2); CoSS s.53(2)"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/16823/1/aA2020-36.pdf"
  citation_locator: >-
    Exit 01-11-2025 PRECEDES the Code's 21-11-2025 commencement, so the award lies wholly under
    the old regime: PoG Act 1972 s.4(2) Explanation (monthly wages ÷ 26 × 15,
    https://clc.gov.in/clc/sites/default/files/PaymentofGratuityAct.pdf) — textually identical
    to CoSS 2020 s.53(2) Explanation 3, both already on record in ws1b_wiring_gratuity.yaml.
  source: >-
    DOJ 01-01-2015, exit 01-11-2025: 10 completed years, every anniversary before the Code
    boundary -> the whole award on the OLD last-drawn base under EVERY candidate transition
    convention (no apportionment choice is interposed for a pre-Code exit). (15/26) × ₹26,000 ×
    10 = ₹1,50,000 = 15,000,000 paise; new-base input deliberately different to prove it is
    never touched.
  ca_initials: PENDING
  ca_date: null
  target: gratuity_hybrid
  inputs:
    doj: "2015-01-01"
    exit_date: "2025-11-01"
    boundary: "2025-11-21"
    old_base: 2600000
    new_base: 5200000
  expected: 15000000

- id: gratuity_hybrid_mid_year_anniversary_split
  statute: Code on Social Security 2020 / Code on Wages 2019
  section: "53; 2(y)"
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/16823/1/aA2020-36.pdf"
  citation_locator: >-
    CoSS 2020 s.53(2) + Explanation 3 (15/26 factor — primary). The pre/post-boundary
    APPORTIONMENT is the recorded interpretation: the Code states no transition convention for
    service straddling 21-11-2025.
  alternatives_considered:
    - "CHOSEN — per-completed-year apportionment (anniversary strictly before 2025-11-21 -> old
       last-drawn base; on/after -> new s.2(y) base), the same convention recorded in full on
       gratuity_hybrid_split_old_and_new_base in ws1b_wiring_gratuity.yaml. Here the June-1
       anniversaries make 2020–2025 pre (6 years) and 2026 post (1 year)."
    - "Whole award on the exit-date regime (MoLE Additional FAQs 16.03.2026 Sl.17 reading):
       all 7 years on the new base -> (15/26) × 52,000 × 7 = ₹2,10,000. May be the correct
       reading — flagged there, flagged here; one CA ruling resolves both vectors."
    - "Day-count pro-rata around the boundary: differs from the chosen convention precisely on
       mid-year cases like this one (the boundary falls between the 2025 and 2026
       anniversaries)."
  source: >-
    DOJ 01-06-2019, exit 01-06-2026, 7 completed years. Chosen convention: 6 pre-boundary years
    on old ₹26,000 -> (15/26) × 26,000 × 6 = ₹90,000; 1 post-boundary year on new ₹52,000 ->
    ₹30,000; total ₹1,20,000 = 12,000,000 paise. Ships BLOCKED pending the CA ruling recorded
    above.
  ca_initials: PENDING
  ca_date: null
  target: gratuity_hybrid
  inputs:
    doj: "2019-06-01"
    exit_date: "2026-06-01"
    boundary: "2025-11-21"
    old_base: 2600000
    new_base: 5200000
  expected: 12000000
