# WS1.E2 — the two transition boundaries the launch checklist names:
#  (1) Income-tax Act 1961 -> Income-tax Act 2025 (commencement 2026-04-01): selector edges,
#      regime-aware form names, period-noun labels.
#  (2) old labour Acts -> Labour Codes (CoSS commencement 21-11-2025): gratuity straddling and
#      pre-Code exits.
# Extends ws1a_regime.yaml and ws1b_wiring_gratuity.yaml. Amounts integer paise.
#
# Boundary-date primary (already on record in ws1a_regime.yaml, egazette PDF read verbatim):
# Income-tax Act 2025 (No. 30 of 2025) s.1(3): "Save as otherwise provided in this Act, it
# shall come into force on the 1st April, 2026."
# (https://egazette.gov.in/WriteReadData/2025/265620.pdf, CG-DL-E-22082025-265620).

# ---- 1961 -> 2025: selector edges --------------------------------------------------------------
- id: regime_credit_only_last_day_1961
  statute: Income-tax Act
  section: "s.1(3) commencement (2025 Act)"
  provenance: primary
  citation_url: "https://egazette.gov.in/WriteReadData/2025/265620.pdf"
  citation_locator: >-
    Income-tax Act, 2025 s.1(3): "it shall come into force on the 1st April, 2026" — an event
    dated 2026-03-31 precedes commencement and is governed by the 1961 Act.
  source: >-
    Credit on 31-03-2026 with no payment date: the single supplied date decides — the day
    BEFORE commencement -> regime_1961. Left twin of ws1a's on-boundary vector (which pins
    2026-04-01 itself as 2025).
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {credit_date: "2026-03-31"}
  expected: regime_1961

- id: regime_payment_only_on_commencement_2025
  statute: Income-tax Act
  section: "s.1(3) commencement (2025 Act)"
  provenance: primary
  citation_url: "https://egazette.gov.in/WriteReadData/2025/265620.pdf"
  citation_locator: >-
    Income-tax Act, 2025 s.1(3) ("come into force ON the 1st April, 2026" — the commencement
    day itself operates under the new Act).
  source: >-
    Payment on 2026-04-01 with no credit date -> regime_2025. Payment-only twin of the existing
    credit-date boundary vectors.
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {payment_date: "2026-04-01"}
  expected: regime_2025

- id: regime_both_before_boundary_1961
  statute: Income-tax Act
  section: "s.1(3) commencement (2025 Act)"
  provenance: primary
  citation_url: "https://egazette.gov.in/WriteReadData/2025/265620.pdf"
  citation_locator: >-
    Income-tax Act, 2025 s.1(3).
  source: >-
    Credit 01-12-2025, payment 31-03-2026 — both strictly before commencement, no tie-break
    involved -> regime_1961 follows directly from s.1(3).
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {credit_date: "2025-12-01", payment_date: "2026-03-31"}
  expected: regime_1961

- id: regime_earlier_of_wide_straddle_1961
  statute: Income-tax Act
  section: "regime boundary — selector"
  provenance: derived
  source: >-
    DERIVED — structural selector rule (earlier of credit/payment), same classification and
    reasoning as ws1a_regime.yaml's straddle vectors: the tie-break is our engine convention
    (MMX-1.0 §WS1.A1), not a statutory figure. Credit 15-02-2026 / payment 15-06-2026 straddle
    the boundary widely; the earlier (February) date governs -> regime_1961.
  ca_initials: PENDING
  ca_date: null
  target: regime_for
  inputs: {credit_date: "2026-02-15", payment_date: "2026-06-15"}
  expected: regime_1961

