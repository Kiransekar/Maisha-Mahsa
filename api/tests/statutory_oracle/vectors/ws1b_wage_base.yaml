# WS1.B1 — Code on Wages s.2(y) statutory wage base (MMX-1.0 §WS1.B1). amounts are integer paise.
#
# PROVENANCE (docs/STATUTORY_SOURCING.md §3). The governing instrument is the Code on Wages, 2019
# (Act No. 29 of 2019, assented 8th August 2019), as hosted on India Code (the Ministry of Law &
# Justice official repository), text "As on the 21th November, 2025":
#   https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf
# s.2(y) was fetched and read in full (re-fetched and re-read verbatim 2026-07-22 for the
# fix:labour-codes ticket, defects #5/#6/#7). The operative wording, verbatim:
#
#   (y) "wages" means all remuneration whether by way of salaries, allowances or otherwise,
#   expressed in terms of money or capable of being so expressed which would, if the terms of
#   employment, express or implied, were fulfilled, be payable to a person employed in respect of
#   his employment or of work done in such employment, and includes, —
#     (i) basic pay; (ii) dearness allowance; and (iii) retaining allowance, if any,
#   but does not include—
#     (a) any bonus payable under any law for the time being in force, which does not form part
#         of the remuneration payable under the terms of employment;
#     (b) the value of any house-accommodation, or of the supply of light, water, medical
#         attendance or other amenity or of any service excluded from the computation of wages by
#         a general or special order of the appropriate Government;
#     (c) any contribution paid by the employer to any pension or provident fund, and the
#         interest which may have accrued thereon;
#     (d) any conveyance allowance or the value of any travelling concession;
#     (e) any sum paid to the employed person to defray special expenses entailed on him by the
#         nature of his employment;
#     (f) house rent allowance;
#     (g) remuneration payable under any award or settlement between the parties or order of a
#         court or Tribunal;
#     (h) any overtime allowance;
#     (i) any commission payable to the employee;
#     (j) any gratuity payable on the termination of employment;
#     (k) any retrenchment compensation or other retirement benefit payable to the employee or
#         any ex gratia payment made to him on the termination of employment:
#       Provided that, for calculating the wages under this clause, if payments made by the
#       employer to the employee under clauses (a) to (i) exceeds one-half, or such other per
#       cent. as may be notified by the Central Government, of the all remuneration calculated
#       under this clause, the amount which exceeds such one-half, or the per cent. so notified,
#       shall be deemed as remuneration and shall be accordingly added in wages under this clause
#       ...
#       Explanation.—Where an employee is given in lieu of the whole or part of the wages payable
#       to him, any remuneration in kind by his employer, the value of such remuneration in kind
#       which does not exceed fifteen per cent. of the total wages payable to him, shall be deemed
#       to form part of the wages of such employee;
#
# CLASSIFICATION CONSEQUENCES locked by these vectors (2026-07-22 fix:labour-codes):
#   #5 — the FIRST PROVISO aggregates "clauses (a) to (i)" ONLY: gratuity (j) and retrenchment /
#        ex-gratia (k) are excluded from wages but sit OUTSIDE the add-back span.
#   #6 — "but does not include" enumerates a CLOSED list (a)-(k); the opening limb makes ALL
#        remuneration wages, so a component in neither list IS wages.
#   #7 — special_allowance appears nowhere in (a)-(k) and is INCLUDED (SC, RPFC (II) WB v.
#        Vivekananda Vidyamandir, 28-02-2019).
#
# NOTE for the verifier: indiacode.nic.in serves this PDF to a normal user-agent (HTTP 200 confirmed)
# but 403s some automated fetchers. Retry with a browser user-agent if a fetch is refused.

- id: wage_base_compliant_no_addback
  statute: Code on Wages 2019
  section: "2(y)"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Chapter I, s.2(y) — inclusion limb clauses (i) basic pay, (ii) dearness allowance,
    (iii) retaining allowance, if any; read with the first proviso to s.2(y) (excluded payments
    under clauses (a) to (i) not exceeding one-half of all remuneration, so no add-back arises)
  source: >-
    Code on Wages, 2019 (Act No. 29 of 2019) s.2(y). Wages are the inclusion limb (basic + DA +
    retaining allowance) exactly; the first proviso's one-half trigger is not met here
    (excluded HRA 40% of total remuneration), so the base is the inclusion limb alone.
  ca_initials: PENDING
  ca_date: null
  target: statutory_wage_base
  # Basic ₹30k + HRA ₹20k = ₹50k total; excluded (a)-(i) ₹20k = 40% <= 50% -> base = ₹30k
  inputs:
    components: {basic: 3000000, hra: 2000000}
  expected: 3000000

- id: wage_base_addback_when_basic_underweighted
  statute: Code on Wages 2019
  section: "2(y)"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Chapter I, first proviso to s.2(y) — "if payments made by the employer to the employee under
    clauses (a) to (i) exceeds one-half ... of the all remuneration calculated under this clause,
    the amount which exceeds such one-half ... shall be deemed as remuneration and shall be
    accordingly added in wages under this clause"
  source: >-
    Code on Wages, 2019 (Act No. 29 of 2019), first proviso to s.2(y). The one-half threshold and
    the add-back of only the EXCESS over one-half are both stated in the proviso verbatim.
    HRA is clause (f) of the exclusion list, so it counts toward the (a)-(i) total.
  ca_initials: PENDING
  ca_date: null
  target: statutory_wage_base
  # Basic ₹20k + HRA ₹40k = ₹60k; excluded (a)-(i) ₹40k > ₹30k cap -> add back ₹10k -> ₹30k
  inputs:
    components: {basic: 2000000, hra: 4000000}
  expected: 3000000

- id: wage_base_overtime_counts_as_excluded
  statute: Code on Wages 2019
  section: "2(y)"
  provenance: primary
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Chapter I, s.2(y) exclusion clause (h) "any overtime allowance", read with the first proviso to
    s.2(y) which aggregates "clauses (a) to (i)" — clause (h) falls inside that range, so overtime
    is part of the excluded total tested against one-half
  source: >-
    Code on Wages, 2019 (Act No. 29 of 2019) s.2(y)(h) and first proviso. Overtime is an excluded
    payment AND is inside the (a)-(i) span the proviso aggregates, so it both stays out of the
    inclusion limb and drives the add-back.
  ca_initials: PENDING
  ca_date: null
  target: statutory_wage_base
  # Basic ₹20k + overtime ₹40k = ₹60k; excluded ₹40k > ₹30k cap -> add back ₹10k -> ₹30k
  inputs:
    components: {basic: 2000000, overtime: 4000000}
  expected: 3000000

- id: wage_base_terminal_payments_outside_addback_span
  statute: Code on Wages 2019
  section: "2(y)"
  # Defect #5 (PROGRESS [WS1-DEFECTS-FOUND]): the SPAN of the add-back numerator is primary — the
  # proviso says "clauses (a) to (i)" and gratuity is clause (j), retrenchment/ex-gratia clause
  # (k), OUTSIDE that span. The DENOMINATOR reading ("the all remuneration calculated under this
  # clause" = every money component passed, including (j)/(k)) is a choice, so the vector as a
  # whole is an interpretation.
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Chapter I, s.2(y): exclusion clauses (j) "any gratuity payable on the termination of
    employment" and (k) "any retrenchment compensation or other retirement benefit ... or any ex
    gratia payment made to him on the termination of employment"; first proviso: "if payments
    made by the employer to the employee under clauses (a) to (i) exceeds one-half ... of the all
    remuneration calculated under this clause" — the aggregation span is (a) to (i), so (j) and
    (k) never drive the add-back.
  alternatives_considered:
    - "CHOSEN — numerator = clauses (a)-(i) only (verbatim proviso span); denominator = ALL money
       components passed, including (j)/(k), reading 'the all remuneration calculated under this
       clause' as the opening limb's 'all remuneration ... expressed in terms of money'. Here:
       Basic ₹20k + HRA ₹25k + gratuity ₹15k -> remuneration ₹60k, cap ₹30k, (a)-(i) total ₹25k
       <= cap -> no add-back -> base ₹20,000."
    - "Denominator excludes (j)/(k) as well (read 'remuneration calculated under this clause' as
       only the components that participate in the wage computation): remuneration ₹45k, cap
       ₹22,500, add-back ₹2,500 -> base ₹22,500. Rejected as the less natural reading of 'all
       remuneration', but note it errs FURTHER toward paying dues; flagged for CA review."
    - "The pre-fix engine behaviour — every non-included key aggregated into the add-back
       numerator: excluded ₹40k > ₹30k cap -> base ₹30,000. Rejected: contradicts the verbatim
       '(a) to (i)' span; this is the defect being fixed."
  ca_initials: OWNER
  ca_date: "2026-07-22"
  target: statutory_wage_base
  # Basic ₹20k + HRA ₹25k + gratuity ₹15k; (a)-(i) = ₹25k <= ₹30k cap -> no add-back -> ₹20k
  inputs:
    components: {basic: 2000000, hra: 2500000, gratuity: 1500000}
  expected: 2000000

- id: wage_base_unknown_component_is_wages
  statute: Code on Wages 2019
  section: "2(y)"
  # Defect #6: the exclusion list is CLOSED ("but does not include— (a) ... (k)"), and the
  # opening limb makes ALL remuneration wages. A component in neither list (here an attendance
  # allowance) is therefore wages. The old engine silently EXCLUDED anything it did not
  # recognise, under-computing PF/ESI/gratuity — under-paying statutory dues.
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Chapter I, s.2(y) opening limb: "'wages' means all remuneration whether by way of salaries,
    allowances or otherwise, expressed in terms of money ... payable to a person employed in
    respect of his employment", followed by the closed exclusion list "but does not include—
    (a) ... (k)". An allowance not within (a)-(k) is not removed from "all remuneration".
  alternatives_considered:
    - "CHOSEN — closed exclusion list: a component matching no exclusion clause is wages
       (included). Errs toward PAYING statutory dues when a component's character is uncertain.
       Supported by the statutory text and by the universality test of RPFC (II) WB v.
       Vivekananda Vidyamandir (SC, 28-02-2019) under the predecessor EPF Act."
    - "MoLE 'Additional FAQs on Labour Codes (As on 16.03.2026)' Sl. No. 13 (on the identically
       structured CoSS 2020 s.2(88)): 'Any payment made to employee which is not part of
       components mentioned under section 2(88) ... shall not be considered for calculation of
       gratuity' — i.e. UNKNOWN components ignored
       (https://www.labour.gov.in/static/uploads/2026/03/a4ccf4c6d97c4f1f36a6d83f8c64213d.pdf).
       Rejected: an FAQ is not an instrument, it contradicts the enacted opening limb ('all
       remuneration'), and following it would under-pay dues. Recorded here for the CA to weigh."
    - "Reject unknown keys loudly (raise) and force the caller to classify every component.
       Arguably the strictest product answer; changes the engine contract, so recorded rather
       than taken unilaterally."
  ca_initials: OWNER
  ca_date: "2026-07-22"
  target: statutory_wage_base
  # Basic ₹20k + attendance allowance ₹10k (in neither list) -> included ₹30k, no exclusions
  inputs:
    components: {basic: 2000000, attendance_allowance: 1000000}
  expected: 3000000

- id: wage_base_special_allowance_included
  statute: Code on Wages 2019
  section: "2(y)"
  # Defect #7: special_allowance was previously classified excluded WITHOUT citation, and the
  # classification materially moves PF/ESI/gratuity bases. It appears nowhere in (a)-(k).
  provenance: interpretation
  citation_url: "https://indiankanoon.org/doc/126246109/"
  citation_locator: >-
    The Regional Provident Fund Commissioner (II) West Bengal v. Vivekananda Vidyamandir & Ors,
    Civil Appeal No. 6221 of 2011 (Supreme Court of India, judgment dated 28 February 2019):
    allowances that are universally, necessarily and ordinarily paid to all employees across the
    board form part of basic wages; only payments either variable or linked to an incentive, or
    not paid across the board, stand excluded. Read with Code on Wages 2019 s.2(y): "special
    allowance" matches no exclusion clause (a)-(k)
    (https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf).
  alternatives_considered:
    - "CHOSEN — special_allowance is WAGES: it is remuneration under the opening limb, appears in
       no exclusion clause, and the SC's universality test (Vivekananda Vidyamandir, 2019, on the
       EPF Act's materially similar basic-wages definition) treats a special allowance paid to
       all employees as basic wages. Here: Basic ₹20k + special ₹10k + HRA ₹5k -> included ₹30k,
       (a)-(i) ₹5k <= ₹17.5k cap -> base ₹30,000."
    - "Classify special_allowance under clause (e) ('any sum paid ... to defray special expenses
       entailed on him by the nature of his employment'). Rejected: a generic CTC
       special/balancing allowance is not tied to employment-specific expenses; the SC in the
       same line of cases treats exactly such camouflaged allowances as basic wages."
    - "The pre-fix engine behaviour — special_allowance excluded and driving the add-back.
       Rejected: uncited, and under-computes the statutory base whenever the 50% trigger is not
       met. This is the defect being fixed."
  ca_initials: OWNER
  ca_date: "2026-07-22"
  target: statutory_wage_base
  # Basic ₹20k + special ₹10k + HRA ₹5k = ₹35k; included ₹30k; (a)-(i) ₹5k <= ₹17,500 cap -> ₹30k
  inputs:
    components: {basic: 2000000, special_allowance: 1000000, hra: 500000}
  expected: 3000000

- id: wage_base_in_kind_capped_15pct
  statute: Code on Wages 2019
  section: "2(y)"
  # The 15% FIGURE is primary (Explanation to s.2(y)). The BASE it is 15% OF is not defined:
  # the Explanation says "fifteen per cent. of the total wages payable to him", and "total wages
  # payable" is itself the quantity being computed. A choice was required, so the VECTOR is an
  # interpretation — see docs/STATUTORY_SOURCING.md §4b question 2 (WS1.B1).
  provenance: interpretation
  citation_url: "https://www.indiacode.nic.in/bitstream/123456789/15793/1/aA2019-29.pdf"
  citation_locator: >-
    Chapter I, Explanation to s.2(y) — "the value of such remuneration in kind which does not
    exceed fifteen per cent. of the total wages payable to him, shall be deemed to form part of
    the wages of such employee". The section defines neither "total wages payable to him" nor the
    order of operations against the first proviso's add-back.
  source: >-
    Code on Wages, 2019 (Act No. 29 of 2019), Explanation to s.2(y), read and quoted above. The
    fifteen-per-cent ceiling is statutory; the base is not. app/core/statutory_wage.py reads it as
    15% of the money wage base AFTER the first-proviso add-back, and adds the capped in-kind value
    on top. VERIFIED: the phrase "in kind" occurs nowhere else in the 32-page Act, which delegates
    no rule-making power on this point, so the Act alone cannot resolve the base. NOT YET CHECKED:
    the Code on Wages (Central) Rules 2020 and any Ministry/CLC FAQ — a web search for these could
    not be completed (search API unavailable at time of writing) and remains open work before the
    CA review. Ships BLOCKED, figure renders ◐ not ✓ (STATUTORY_SOURCING §3).
  alternatives_considered:
    - "15% of the money wage base AFTER the first-proviso add-back, added on top (CHOSEN; implemented in app/core/statutory_wage.py). Here 15% x ₹30,000 = ₹4,500 -> ₹34,500."
    - "15% of the inclusion limb only (basic + DA + retaining), ignoring any add-back. Identical here (no add-back in this vector) but diverges whenever the proviso fires."
    - "15% of ALL remuneration (the proviso's denominator, i.e. money remuneration including excluded allowances) rather than of wages."
    - "15% of the post-inclusion total treated as a CEILING ON THE WHOLE wage figure inclusive of the in-kind value (i.e. in-kind may form at most 15% of the final wages), which solves the circularity as in_kind_counted = min(in_kind, 0.15/0.85 x money_base) rather than 0.15 x money_base."
    - "In-kind excluded entirely unless paid 'in lieu of' wages on the Explanation's literal wording, i.e. a benefit given IN ADDITION to full money wages is not deemed part of wages at all."
  ca_initials: PENDING
  ca_date: null
  target: statutory_wage_base
  # Basic ₹30k, in-kind ₹10k; countable = min(₹10k, 15% of ₹30k = ₹4,500) = ₹4,500 -> ₹34,500
  inputs:
    components: {basic: 3000000}
    in_kind: 1000000
  expected: 3450000
