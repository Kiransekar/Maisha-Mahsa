# ---- s.50 interest (18% notified; /365 divisor is the recorded interpretation) -----------------
- id: gst_interest_zero_days
  statute: CGST Act 2017
  section: "50(1)"
  provenance: derived
  source: >-
    DERIVED — tax paid within the prescribed period leaves no "period for which the tax ...
    remains unpaid" (s.50(1)); no days, no interest. No figure lifted.
  ca_initials: PENDING
  ca_date: null
  target: interest_3b
  inputs: {cash_tax: 10000000, days_late: 0}
  expected: 0

- id: gst_interest_full_year_exact_18pct
  statute: CGST Act 2017
  section: "50(1); Notf 13/2017"
  provenance: interpretation
  citation_url: "https://gstcouncil.gov.in/sites/default/files/2024-04/notfctn-13-central-tax-english.pdf"
  citation_locator: >-
    Notification 13/2017-Central Tax, Table Sl.1: "Sub-section (1) of section 50 — 18" (per
    cent per annum); CGST Act s.50(1): "at such rate, not exceeding eighteen per cent., as may
    be notified" (https://cbic-gst.gov.in/pdf/CGST-Act-Updated-30092020.pdf).
  alternatives_considered:
    - "CHOSEN — simple interest, days/365 annualisation: 365 late days on ₹1,00,000 = 18% ×
       365/365 = ₹18,000 exactly."
    - "days/366 in a leap year — would give ₹17,950.82 for the same 365 days. Neither s.50 nor
       rule 88B prescribes the divisor; /365 is the administration's standard convention but a
       convention nonetheless, hence interpretation."
    - "Calendar-month proration (18%/12 per month or part) — no textual basis found; rejected."
  source: >-
    18% p.a. is primary (Notf 13/2017). The /365 day-count is the recorded choice. ₹1,00,000 ×
    18% × 365/365 = ₹18,000 = 1,800,000 paise.
  ca_initials: PENDING
  ca_date: null
  target: interest_3b
  inputs: {cash_tax: 10000000, days_late: 365}
  expected: 1800000

- id: gst_interest_73_days_exact_fifth
  statute: CGST Act 2017
  section: "50(1); Notf 13/2017"
  provenance: interpretation
  citation_url: "https://gstcouncil.gov.in/sites/default/files/2024-04/notfctn-13-central-tax-english.pdf"
  citation_locator: >-
    Notification 13/2017-Central Tax Sl.1 (18% u/s 50(1)).
  alternatives_considered:
    - "CHOSEN — days/365: 73/365 = exactly 1/5 of a year; ₹50,000 × 18% × 1/5 = ₹1,800."
    - "days/366 (leap): ₹1,795.08 — divisor choice as recorded on
       gst_interest_full_year_exact_18pct; one CA confirmation resolves all three vectors."
  source: >-
    ₹50,000 × 0.18 × 73/365 = ₹1,800 exactly = 180,000 paise (no rounding involved at this
    exact-fifth boundary).
  ca_initials: PENDING
  ca_date: null
  target: interest_3b
  inputs: {cash_tax: 5000000, days_late: 73}
  expected: 180000

- id: gst_interest_30_days_rounding
  statute: CGST Act 2017
  section: "50(1); Notf 13/2017"
  provenance: interpretation
  citation_url: "https://gstcouncil.gov.in/sites/default/files/2024-04/notfctn-13-central-tax-english.pdf"
  citation_locator: >-
    Notification 13/2017-Central Tax Sl.1 (18% u/s 50(1)).
  alternatives_considered:
    - "CHOSEN — days/365 with rupee rounding of the result: ₹1,00,000 × 18% × 30/365 =
       ₹1,479.452... -> ₹1,479."
    - "days/366: ₹1,475.41. Divisor choice as recorded on gst_interest_full_year_exact_18pct."
  source: >-
    10,000,000 paise × 0.18 × 30/365 = 147,945.205... paise -> half-up to 147,945 -> rupee
    rounding gives ₹1,479 = 147,900 paise.
  ca_initials: PENDING
  ca_date: null
  target: interest_3b
  inputs: {cash_tax: 10000000, days_late: 30}
  expected: 147900

