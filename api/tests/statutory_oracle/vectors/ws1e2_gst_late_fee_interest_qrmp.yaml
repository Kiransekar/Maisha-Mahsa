# WS1.E2 — GST: GSTR-3B late fee (CGST Act s.47 + waiver notifications), s.50 interest, QRMP
# PMT-06 fixed sum, composition levy rates, and the composite 3B computation.
# Amounts are integer paise. The engine reports COMBINED CGST+SGST figures; every vector's
# comment shows the split. The SGST half rests on the mirrored State GST Acts (the GST design
# levies identical central and State halves); the CGST half is cited to the central instrument.
#
# PRIMARY SOURCES fetched 2026-07-23 and read verbatim:
#  * CGST Act 2017 s.47(1) — "a late fee of one hundred rupees for every day during which such
#    failure continues subject to a maximum amount of five thousand rupees"
#    (https://cbic-gst.gov.in/pdf/CGST-Act-Updated-30092020.pdf).
#  * Notification No. 76/2018-Central Tax (31-12-2018, G.S.R. 1253(E)) — late fee under s.47
#    "in excess of an amount of twenty-five rupees for every day" waived; where central tax
#    payable is nil, waived in excess of "ten rupees for every day"
#    (https://gstcouncil.gov.in/sites/default/files/2024-05/notfctn-76-central-tax-english-2018.pdf).
#  * Notification No. 19/2021-Central Tax (01-06-2021) — for June 2021 onwards, TOTAL s.47 late
#    fee capped by class: nil-return ₹250; AATO ≤ ₹1.5 crore ₹1,000; ₹1.5–5 crore ₹2,500 (all
#    CGST side, mirrored in SGST). Above ₹5 crore no waiver-cap applies, leaving the s.47(1)
#    statutory maximum ₹5,000
#    (https://gstcouncil.gov.in/sites/default/files/2024-05/notfctn-19-central-tax-english-2021.pdf).
#  * Notification No. 13/2017-Central Tax (28-06-2017) — interest u/s 50(1) fixed at 18% p.a.
#    (https://gstcouncil.gov.in/sites/default/files/2024-04/notfctn-13-central-tax-english.pdf);
#    CGST Act s.50(1): rate "not exceeding eighteen per cent., as may be notified"; proviso —
#    interest levied "on that portion of the tax that is paid by debiting the electronic cash
#    ledger" (net-cash basis).
#  * Notification No. 85/2020-Central Tax (10-11-2020) — QRMP fixed-sum deposit: "thirty five
#    per cent. of the tax liability paid by debiting the electronic cash ledger in the return
#    for the preceding quarter where the return is furnished quarterly"
#    (https://gstcouncil.gov.in/sites/default/files/2024-05/notfctn-85-central-tax-english-2020.pdf).
#  * CGST Act s.10 + CGST Rules rule 7 (rate table, as substituted by Notf 50/2020-CT):
#    manufacturers "half per cent. of the turnover"; Schedule II para 6(b) suppliers (restaurant)
#    "two and a half per cent."; other suppliers "half per cent. of the turnover of taxable
#    supplies"; s.10(2A) persons "three per cent." — each CGST side, mirrored in SGST
#    (https://cbic-gst.gov.in/pdf/24092021-CGST-Rules-2017-Part-A-Rules.pdf).
#
# ENGINE-SCOPE NOTES (reported in PROGRESS [WS1.E2-expand], not papered over):
#  * TURNOVER-LINKED CAPS: late_fee_3b has no turnover input — its ₹10,000 combined cap is the
#    s.47 statutory maximum (the > ₹5 crore AATO band). For AATO ≤ ₹5 crore, Notification
#    19/2021 caps the fee LOWER (₹2,000 / ₹5,000 combined) — the engine OVERSTATES the fee for
#    those taxpayers once the lower cap would bind (> 40 / > 100 days late). Real gap, reported.
#  * DAY-COUNT: s.50 and rule 88B prescribe no annual divisor; the engine uses /365. Interest
#    vectors are provenance=interpretation with the divisor alternatives recorded.

