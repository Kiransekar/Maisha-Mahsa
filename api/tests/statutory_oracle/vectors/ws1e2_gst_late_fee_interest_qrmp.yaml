# ---- composite GSTR-3B: set-off + fee + net-cash interest --------------------------------------
- id: gstr3b_composite_setoff_fee_and_netcash_interest
  statute: CGST Act 2017
  section: "49(5); 47(1); 50(1) proviso"
  provenance: interpretation
  citation_url: "https://gstcouncil.gov.in/sites/default/files/2024-04/notfctn-13-central-tax-english.pdf"
  citation_locator: >-
    Interest 18%: Notification 13/2017-Central Tax Sl.1. Net-cash base: CGST Act s.50(1)
    proviso — interest "levied on that portion of the tax that is paid by debiting the
    electronic cash ledger" (https://cbic-gst.gov.in/pdf/CGST-Act-Updated-30092020.pdf).
    Late fee ₹25+₹25/day: Notification 76/2018. Set-off: s.49(5) own-head first.
  alternatives_considered:
    - "CHOSEN — days/365 annualisation of the 18% rate (divisor choice recorded on
       gst_interest_full_year_exact_18pct; this vector otherwise rests on primary text)."
    - "days/366 — would give interest ₹888 here."
  source: >-
    Output CGST ₹50,000 + SGST ₹50,000; ITC CGST ₹20,000 + SGST ₹20,000 -> own-head set-off
    (s.49(5)(b)/(c)) leaves cash ₹30,000 + ₹30,000 = ₹60,000. Filed 10 days late: late fee 10 ×
    ₹50 = ₹500. Interest on the CASH portion only (s.50(1) proviso): ₹60,000 × 18% × 10/365 =
    ₹295.89... -> ₹296. Total payable = 6,000,000 + 50,000 + 29,600 = 6,079,600 paise.
  ca_initials: PENDING
  ca_date: null
  target: gstr3b
  inputs:
    output: {igst: 0, cgst: 5000000, sgst: 5000000}
    itc_available: {igst: 0, cgst: 2000000, sgst: 2000000}
    days_late: 10
  expected: {cash_total: 6000000, late_fee: 50000, interest: 29600, total_payable: 6079600}

