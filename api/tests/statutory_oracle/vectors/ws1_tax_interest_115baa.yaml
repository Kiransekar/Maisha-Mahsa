# s.234B / s.234C interest and s.115BAA company tax — recomputable single figures.
# Provenance recorded per docs/STATUTORY_SOURCING.md §3. Every rate, threshold and cut-off date
# below was read in the instrument itself (Income-tax Act, 1961; Income-tax Rules, 1962;
# Finance Act, 2025) — not from a restatement. amounts are integer paise.
#
# NOTE for a re-verifier: incometaxindia.gov.in returns 403 to bare HTTP clients. The pages below
# serve normally with ordinary browser request headers (User-Agent + Accept + Accept-Language).

- id: interest_234b_applies
  statute: Income-tax Act
  section: "234B"
  provenance: primary
  citation_url: https://www.incometaxindia.gov.in/w/section-234b-37
  citation_locator: >-
    s.234B(1) — "where the advance tax paid by such assessee under the provisions of section 210
    is less than ninety per cent of the assessed tax, the assessee shall be liable to pay simple
    interest at the rate of one per cent for every month or part of a month ... on the amount by
    which the advance tax paid as aforesaid falls short of the assessed tax".
  source: >-
    Both the 90% trigger and the 1%-per-month rate on the shortfall are the words of s.234B(1).
    The ₹100 round-down of the interest base is Rule 119A(c), Income-tax Rules, 1962 (see the
    interest_234b_relief_above_90pct vector) — inert here, ₹4,00,000 is already a multiple of ₹100.
    ₹20,000 is then arithmetic: ₹4,00,000 shortfall × 1% × 5 months.
  ca_initials: PENDING
  ca_date: null
  target: interest_234b
  # assessed ₹5L, advance ₹1L (<90% of ₹5L), 5 months -> shortfall ₹4L × 1% × 5 = ₹20,000
  inputs: {assessed_tax: 50000000, advance_paid: 10000000, months: 5}
  expected: 2000000

- id: interest_234b_rule_119a_rounddown_exercised
  statute: Income-tax Rules
  section: "Rule 119A(c)"
  provenance: primary
  citation_url: https://indiankanoon.org/doc/143209285/
  citation_locator: >-
    Rule 119A, Income-tax Rules, 1962, clause (c) — "the amount of tax, penalty or other sum in
    respect of which such interest is to be calculated shall be rounded off to the nearest
    multiple of one hundred rupees and for this purpose any fraction of one hundred rupees
    shall be ignored".
  source: >-
    The interest BASE under s.234B(1) is the shortfall ("the amount by which the advance tax
    paid ... falls short of the assessed tax"); Rule 119A(c) rounds that base down to the
    nearest ₹100. This vector exists because the 2026-07-22 adversarial verify found the
    round-down was not exercised by ANY test in either engine (every prior input's shortfall
    was already a ₹100 multiple, so deleting the rounding line stayed green). Here the raw
    shortfall ₹1,00,050 is NOT a multiple: base rounds to ₹1,00,000; ₹1,00,000 × 1% × 3 =
    ₹3,000. Without the round-down the figure would be ₹3,001.50 -> ₹3,002 — a distinguishing
    output, so this vector kills that mutation in both engines via parity replay.
  ca_initials: OWNER
  ca_date: 2026-07-22
  target: interest_234b
  # assessed ₹1,00,050, nothing paid, 3 months -> base ₹1,00,000 (rounded down) × 1% × 3 = ₹3,000
  inputs: {assessed_tax: 10005000, advance_paid: 0, months: 3}
  expected: 300000

- id: interest_234b_relief_above_90pct
  statute: Income-tax Act
  section: "234B"
  provenance: primary
  citation_url: https://www.incometaxindia.gov.in/w/section-234b-37
  citation_locator: >-
    s.234B(1) — the charge arises only "where the advance tax paid ... is less than ninety per
    cent of the assessed tax". ₹4,50,000 is exactly 90% of ₹5,00,000, so the condition is not met
    and no interest is chargeable.
  source: >-
    Nil is the direct consequence of the ninety-per-cent threshold in the charging words of
    s.234B(1); no other provision is engaged.
  ca_initials: PENDING
  ca_date: null
  target: interest_234b
  inputs: {assessed_tax: 50000000, advance_paid: 45000000, months: 5}
  expected: 0

- id: interest_234c_full_shortfall
  statute: Income-tax Act
  section: "234C"
  provenance: primary
  citation_url: https://www.incometaxindia.gov.in/w/section-234c-40
  citation_locator: >-
    s.234C(1)(a)(i) — advance tax "on or before the 15th day of June ... less than fifteen per
    cent", "on or before the 15th day of September ... less than forty-five per cent", "on or
    before the 15th day of December ... less than seventy-five per cent" attracts "simple
    interest at the rate of one per cent per month for a period of three months on the amount of
    the shortfall"; and s.234C(1)(a)(ii) — advance tax "on or before the 15th day of March ...
    less than the tax due on the returned income" attracts "simple interest at the rate of one
    per cent on the amount of the shortfall".
  source: >-
    Nothing paid, so every installment is short by its full statutory percentage. ₹20,200 is
    arithmetic on the four rates in the locator: (15% × ₹4,00,000 × 1% × 3) = ₹1,800 +
    (45% × 1% × 3) = ₹5,400 + (75% × 1% × 3) = ₹9,000 + (100% × 1% × 1) = ₹4,000.
    The first proviso (12%/36% relief) is not reached — nothing was paid.
  ca_initials: PENDING
  ca_date: null
  target: interest_234c
  inputs: {total_liability: 40000000, cumulative_paid: [0, 0, 0, 0]}
  expected: 2020000

- id: interest_234c_on_schedule_nil
  statute: Income-tax Act
  section: "234C"
  provenance: primary
  citation_url: https://www.incometaxindia.gov.in/w/section-234c-40
  citation_locator: >-
    s.234C(1)(a)(i) and (ii) — interest is chargeable only where the advance tax paid by 15 June /
    15 September / 15 December / 15 March is "less than" fifteen / forty-five / seventy-five / one
    hundred per cent of the tax due. Here the cumulative payments are exactly 15%, 45%, 75% and
    100% of ₹4,00,000, so no installment is short and the charge never arises. (The first proviso
    to s.234C(1)(a), which waives interest at twelve per cent / thirty-six per cent by 15 June /
    15 September, is a lower floor and is not what carries this result.)
  source: >-
    Nil follows from the "less than" condition in the charging clauses, not from the relief
    proviso — every installment is paid at its full statutory percentage.
  ca_initials: PENDING
  ca_date: null
  target: interest_234c
  inputs: {total_liability: 40000000, cumulative_paid: [6000000, 18000000, 30000000, 40000000]}
  expected: 0

- id: company_tax_115baa_1cr
  statute: Income-tax Act
  section: "115BAA"
  provenance: primary
  citation_url: https://www.incometaxindia.gov.in/w/section-115baa-2
  citation_locator: >-
    s.115BAA(1) — "the income-tax payable in respect of the total income of a person, being a
    domestic company ... shall, at the option of such person, be computed at the rate of
    twenty-two per cent". Surcharge and cess are not in s.115BAA; they come from the annual
    Finance Act — see citation_url_surcharge_cess below.
  citation_url_surcharge_cess: https://www.incometaxindia.gov.in/w/section-2-135
  citation_locator_surcharge_cess: >-
    Finance Act, 2025, s.2 — proviso reading "Provided also that in case of every domestic company
    whose income is chargeable to tax under section 115BAA or section 115BAB of the Income-tax
    Act, the income-tax computed under this sub-section shall be increased by a surcharge, for the
    purposes of the Union, calculated at the rate of ten per cent. of such income-tax"
    (flat, with no income threshold and no marginal relief); and s.2(11) — the "Health and
    Education Cess on income-tax", "calculated at the rate of four per cent. of such income-tax
    and surcharge".
  source: >-
    Three separately-cited statutory rates; 25.168% is their arithmetic composition
    (22% × 1.10 × 1.04). ₹1,00,00,000 × 25.168% = ₹25,16,800. The 10% surcharge is flat for a
    115BAA company, so the ₹1 crore / ₹10 crore slabs and marginal relief in Paragraph E of the
    First Schedule do not apply.
  ca_initials: PENDING
  ca_date: null
  target: company_tax_115baa
  inputs: {total_income: 1000000000}  # ₹1,00,00,000 -> 25.168% = ₹25,16,800
  expected: 251680000
