# Launch stack: Rust Mahsa sidecar + Postgres + NestJS API. Migrations run once before the API.
#   cp .env.example .env   # set strong MAISHA_APP_PASSWORD + MAISHA_SESSION_SECRET for prod
#   docker compose up -d --build
# The `dif` (Rust gatekeeper) is built from the sibling ../dif project — the validation authority.
services:
  dif:
    build:
      context: ../dif
      dockerfile: Dockerfile
    environment:
      MAHSA_ADDR: "0.0.0.0:8088"
    expose: ["8088"]
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-maisha}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-maisha}"
      POSTGRES_DB: "${POSTGRES_DB:-maisha}"
    volumes:
      - maisha_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maisha}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: { context: ., dockerfile: Dockerfile }
    command: ["npm", "run", "migrate"]
    environment:
      MAISHA_DATABASE_URL: "postgres://${POSTGRES_USER:-maisha}:${POSTGRES_PASSWORD:-maisha}@db:5432/${POSTGRES_DB:-maisha}"
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  api:
    build: { context: ., dockerfile: Dockerfile }
    env_file: [.env]
    environment:
      MAISHA_ENVIRONMENT: "${MAISHA_ENVIRONMENT:-production}"
      MAISHA_MAHSA_URL: "http://dif:8088"
      MAISHA_DATABASE_URL: "postgres://${POSTGRES_USER:-maisha}:${POSTGRES_PASSWORD:-maisha}@db:5432/${POSTGRES_DB:-maisha}"
      MAISHA_DB_SYNC: "false"
      MAISHA_SECURE_COOKIES: "${MAISHA_SECURE_COOKIES:-true}"
      # Run the daily scheduler in-process (single replica). Set SMTP vars in .env to actually send.
      MAISHA_SCHEDULER_ENABLED: "${MAISHA_SCHEDULER_ENABLED:-true}"
    ports:
      - "8000:8000"
    depends_on:
      db: { condition: service_healthy }
      dif: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

volumes:
  maisha_pg:
