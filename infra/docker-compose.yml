# Full local stack (PRD §8). `make dev` brings this up.
# Self-hosted, no paid APIs. SQLite lives on a mounted volume next to the api service.
services:
  dif:
    build:
      context: ../dif
      dockerfile: Dockerfile
    environment:
      MAHSA_ADDR: "0.0.0.0:8088"
    ports:
      - "8088:8088"
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      MAISHA_MAHSA_URL: "http://dif:8088"
      MAISHA_DATABASE_URL: "sqlite:////data/maisha.db"
      MAISHA_BETTER_AUTH_URL: "${MAISHA_BETTER_AUTH_URL:-}"
      MAISHA_SESSION_SECRET: "${MAISHA_SESSION_SECRET:-dev-insecure-session-secret-change-me}"
    volumes:
      - maisha_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - dif
      - redis
    restart: unless-stopped

  # Scheduler (PRD Layer 6): runs the daily snapshot capture + 8pm CFO brief in-process.
  scheduler:
    build:
      context: ../api
      dockerfile: Dockerfile
    command: ["python", "-m", "app.jobs", "serve"]
    environment:
      MAISHA_MAHSA_URL: "http://dif:8088"
      MAISHA_DATABASE_URL: "sqlite:////data/maisha.db"
      MAISHA_SMTP_HOST: "mailhog"
      MAISHA_SMTP_PORT: "1025"
      MAISHA_BRIEF_HOUR: "${MAISHA_BRIEF_HOUR:-20}"
      MAISHA_BRIEF_TZ: "${MAISHA_BRIEF_TZ:-Asia/Kolkata}"
    volumes:
      - maisha_data:/data
    depends_on:
      - dif
      - mailhog
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    restart: unless-stopped

  # Local LLM (Maisha). Pull a model once it is up: `docker compose exec ollama ollama pull qwen3:14b`
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  maisha_data:
  redis_data:
  ollama_data:
