# WS10.2 — CERT-In 180-day log retention (host-side; every container logs to the journal via
# the journald driver set in docker-compose.prod.yml).
#
# Install on the VPS (docs/DEPLOYMENT.md §0):
#   sudo install -D -m 0644 infra/host/journald-maisha.conf \
#     /etc/systemd/journald.conf.d/maisha.conf
#   sudo systemctl restart systemd-journald
#
# MaxRetentionSec is the TIME window: entries older than 180 days are dropped, entries younger
# are kept. SystemMaxUse must stay generous enough that SIZE-based rotation never deletes an
# entry younger than 180 days — if the journal approaches 4G before 180 days pass, grow this
# (and the disk), never shrink the retention window below 180 days.
[Journal]
Storage=persistent
MaxRetentionSec=180day
SystemMaxUse=4G
